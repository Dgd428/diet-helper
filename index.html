<script id="embedded-ingredients" type="application/json">{"鸡蛋":{"category":"蛋类","calories":"每100g约144 kcal（1个中等鸡蛋约70 kcal）","storage":"买回来不要洗！蛋壳表面的保护膜洗掉了反而容易坏。大头朝上放入冰箱冷藏室，可保存2-3周。如果想知道鸡蛋新不新鲜：放一碗冷水里，沉底平躺的非常新鲜，竖起来的大概2-3周了还能吃，浮起来的就别吃了。","tips":"室温鸡蛋更容易煮出溏心蛋。从冰箱拿出来的鸡蛋直接下冷水锅也不会裂——温差没那么夸张。蛋壳颜色和营养无关，红壳白壳都一样。","dishes":["水煮蛋 + 全麦吐司 + 无糖豆浆","牛奶燕麦粥 + 煮鸡蛋","蒸红薯 + 水煮蛋 + 凉拌黄瓜","蒸蛋羹 + 凉拌菠菜","番茄炒蛋 + 蚝油生菜 + 杂粮饭","虾仁滑蛋 + 蒜蓉西兰花 + 杂粮饭","白灼虾 + 紫菜蛋花汤","番茄菌菇豆腐汤 + 凉拌木耳","香煎豆腐 + 番茄蛋花汤","菌菇清汤 + 黄瓜炒鸡蛋"]},"全麦吐司":{"category":"主食","calories":"每100g约250 kcal（1片约70-80 kcal）","storage":"开封后密封袋封好，常温保存3-5天。吃不完的可以冷冻（不是冷藏！冷藏会让面包变干变硬），冷冻可保存1个月，吃的时候直接烤或微波炉解冻即可。","tips":"看配料表：第一位必须是「全麦粉」而不是「小麦粉」，才是真全麦。颜色深不一定是全麦——有些是加了焦糖色。真正的全麦面包能看到麦麸颗粒。","dishes":["水煮蛋 + 全麦吐司 + 无糖豆浆","全麦鸡胸肉三明治"]},"鸡胸肉":{"category":"肉类","calories":"每100g约133 kcal","storage":"冷藏保存最多2天，买回来立刻用保鲜袋分装（每袋一顿的量），放入冷冻室，可保存1个月。解冻时提前一晚放冷藏室，不要用热水泡（肉会变柴）。","tips":"鸡胸肉不柴的秘诀：1）横着片薄 2）中小火慢煎 3）出锅后静置2分钟再切。新鲜鸡胸肉呈粉红色有光泽，手指按压有弹性，闻起来没有酸味。","dishes":["全麦鸡胸肉三明治","香煎鸡胸肉 + 清炒西兰花 + 杂粮饭","口蘑炒鸡丁 + 白灼生菜 + 杂粮饭"]},"西兰花":{"category":"蔬菜","calories":"每100g约34 kcal","storage":"整颗用保鲜膜包裹，放冰箱冷藏室，可保存5-7天。如果吃不完，掰小朵焯水1分钟后沥干，分装冷冻可保存1个月。","tips":"选花球紧实、颜色深绿、花苞没有开放或变黄的。茎部切口湿润说明新鲜。焯水时不盖锅盖能保持翠绿，过冷水也能锁色。","dishes":["香煎鸡胸肉 + 清炒西兰花 + 杂粮饭","虾仁滑蛋 + 蒜蓉西兰花 + 杂粮饭","冬瓜虾仁汤 + 蒜蓉西兰花","红烧排骨 + 蒜蓉西兰花 + 白米饭"]},"即食燕麦片":{"category":"主食","calories":"每100g约377 kcal（每次40g约150 kcal）","storage":"密封罐或密封袋装好，放在阴凉干燥处，开封后3个月内吃完。不要放冰箱，会吸潮。","tips":"即食燕麦片和需要煮的燕麦片不一样——即食的用热水/热牛奶泡就能吃。买原味的，不要买添加了糖和果干的风味款。","dishes":["牛奶燕麦粥 + 煮鸡蛋","隔夜燕麦杯","坚果燕麦粥 + 煮鸡蛋 + 橙汁"]},"脱脂牛奶":{"category":"乳制品","calories":"每100ml约35 kcal","storage":"开封前常温保存（看保质期）。开封后必须冷藏，3天内喝完。倒牛奶之前摇晃一下，因为脱脂牛奶放久了会分层。","tips":"脱脂牛奶加热时不要煮沸——边缘冒小气泡（约70度）就可以关火了，煮沸会破坏蛋白质还会溢锅。","dishes":["牛奶燕麦粥 + 煮鸡蛋","隔夜燕麦杯"]},"无糖豆浆":{"category":"饮品","calories":"每100ml约30 kcal","storage":"市售盒装未开封常温保存。开封后冷藏，2天内喝完。自制豆浆冷藏不超过24小时。","tips":"配料表只应该有「水、大豆」，没有「白砂糖」「麦芽糖浆」等。豆浆加热时容易假沸——看到泡沫膨胀不代表真的沸腾了，要继续煮3-5分钟。","dishes":["水煮蛋 + 全麦吐司 + 无糖豆浆"]},"无糖酸奶":{"category":"乳制品","calories":"每100g约60-70 kcal","storage":"冷藏保存，看包装保质期。不要冷冻，解冻后口感会变渣。","tips":"配料表第一项应该是「生牛乳」，添加了「白砂糖」「果葡糖浆」「果酱」的都不算无糖。希腊酸奶比普通酸奶蛋白质更高（过滤了乳清），做酸奶碗口感更好。","dishes":["无糖酸奶碗（蓝莓坚果版）","隔夜燕麦杯","火腿芝士可颂 + 水果酸奶杯"]},"蓝莓":{"category":"水果","calories":"每100g约57 kcal","storage":"不要洗！洗了再放冰箱会发霉。买回来原盒放入冰箱冷藏，吃多少洗多少。冷藏可保存5-7天。如果买多了可以冷冻，做酸奶碗或燕麦粥时直接放。","tips":"表面有白色果粉的更新鲜（那是天然保护层）。蓝莓越紫越甜。如果盒子里有少量软的可以挑出来先吃，不影响其他的。","dishes":["无糖酸奶碗（蓝莓坚果版）"]},"混合坚果":{"category":"坚果","calories":"每100g约550-600 kcal（每次10-15g约70-80 kcal）","storage":"密封罐装好，放在阴凉干燥处（或冰箱冷藏），避免阳光直射。开封后最好1个月内吃完，坚果含油量高容易哈喇（变质）。","tips":"买原味坚果，不要买盐焗、糖炒、蜂蜜味的。一次不要吃超过一小把（约15g），坚果虽好但热量密度高。","dishes":["无糖酸奶碗（蓝莓坚果版）","坚果燕麦粥 + 煮鸡蛋 + 橙汁"]},"红薯":{"category":"主食","calories":"每100g约86 kcal","storage":"不要放冰箱！红薯怕冷，冷藏会让淀粉转化成糖影响口感，还会冻伤。放在阴凉通风处即可，可保存1-2周。","tips":"选表皮光滑、没有黑斑、两端完整的。发芽的红薯可以吃（和土豆不一样！），但口感和营养会下降。蒸之前用刷子把泥土刷干净就行。","dishes":["蒸红薯 + 水煮蛋 + 凉拌黄瓜"]},"黄瓜":{"category":"蔬菜","calories":"每100g约16 kcal（几乎零卡）","storage":"用厨房纸包住（吸水），再套保鲜袋放冰箱冷藏，可保存1周。不要放在冰箱最冷的位置（会冻伤变透明）。","tips":"选表皮深绿、刺硬的，摸起来硬的说明新鲜。黄瓜两头有点苦是正常的——两头切掉即可。凉拌时先拍裂再切，更容易入味。","dishes":["蒸红薯 + 水煮蛋 + 凉拌黄瓜","青椒牛柳 + 凉拌黄瓜 + 杂粮饭","菌菇清汤 + 黄瓜炒鸡蛋","土豆炖牛肉 + 凉拌黄瓜 + 白米饭"]},"番茄":{"category":"蔬菜","calories":"每100g约18 kcal","storage":"常温保存！放冰箱会让番茄失去风味变粉。放在阴凉处，蒂朝下放置，可保存3-5天。如果已经熟透了才需要放冰箱延缓。","tips":"番茄去皮技巧：顶部划十字，用开水烫30秒，轻松撕皮。炒番茄出汁多的秘诀：用锅铲把番茄压一压。","dishes":["番茄炒蛋 + 蚝油生菜 + 杂粮饭","番茄菌菇豆腐汤 + 凉拌木耳","香煎豆腐 + 番茄蛋花汤"]},"牛油果":{"category":"水果","calories":"每100g约160 kcal（半个约120 kcal）","storage":"硬的牛油果常温放2-3天变软（和苹果香蕉放一起熟更快）。软了之后放冰箱冷藏，可以多保存2-3天。切开后未吃完的一半：带核的那半淋一点柠檬汁，保鲜膜贴面封好放冰箱，延缓氧化变黑。","tips":"轻按牛油果尾部——稍微能按动但不软塌就是最佳食用状态。表皮深褐带疙瘩的一般是Hass品种，口感最奶油。","dishes":["三文鱼杂粮饭沙拉碗","牛油果鸡蛋三明治 + 全脂牛奶"]},"生菜":{"category":"蔬菜","calories":"每100g约15 kcal","storage":"厨房纸包住根部，套保鲜袋放冰箱冷藏，可保存3-5天。不要提前洗——洗了再放容易烂。","tips":"做沙拉选手撕不要刀切（刀切横截面氧化快）。白灼生菜焯水不超过30秒。","dishes":["全麦鸡胸肉三明治","番茄炒蛋 + 蚝油生菜 + 杂粮饭","口蘑炒鸡丁 + 白灼生菜 + 杂粮饭","三文鱼杂粮饭沙拉碗"]},"杂粮饭":{"category":"主食","calories":"每100g熟饭约116 kcal","storage":"煮好的杂粮饭放凉后分装冷冻（不是冷藏！），冷冻可保存2周。吃的时候微波炉加热2-3分钟即可，和现煮的一样。","tips":"杂粮米（糙米+燕麦米+小米+黑米等混合）需要提前泡30分钟以上，不然煮出来会夹生。水量比煮白米饭时多15%左右。一次可以煮一周的量分装冷冻。","dishes":["香煎鸡胸肉 + 清炒西兰花 + 杂粮饭","番茄炒蛋 + 蚝油生菜 + 杂粮饭","虾仁滑蛋 + 蒜蓉西兰花 + 杂粮饭","青椒牛柳 + 凉拌黄瓜 + 杂粮饭","口蘑炒鸡丁 + 白灼生菜 + 杂粮饭","葱烧豆腐 + 清炒豆芽 + 杂粮饭","三文鱼杂粮饭沙拉碗"]},"虾仁":{"category":"海鲜","calories":"每100g约99 kcal","storage":"冷冻虾仁买回来直接冷冻保存，可保存1-2个月。解冻放冷藏室或冷水浸泡，不要用热水。鲜虾仁冷藏最多1天。","tips":"买冷冻虾仁看配料表：只应该有「虾仁」，有「三聚磷酸钠」等保水剂的不建议（煮了会缩水严重）。虾仁变红色卷曲就是熟了，煮过头会变橡皮。","dishes":["虾仁滑蛋 + 蒜蓉西兰花 + 杂粮饭","冬瓜虾仁汤 + 蒜蓉西兰花","白灼虾 + 紫菜蛋花汤","蒜香意大利面 + 煎虾仁 + 蔬菜沙拉"]},"牛里脊":{"category":"肉类","calories":"每100g约125 kcal","storage":"冷藏不超过2天。冷冻前用保鲜袋分装好（一顿的量），挤出空气封口，冷冻可保存1个月。解冻提前一晚放冷藏。","tips":"切牛肉最重要的原则：逆着纹路切！肉的纤维走向是纵向的，刀要横向切，切断纤维口感才嫩。牛肉炒的时候全程大火快炒，变色就出锅。","dishes":["青椒牛柳 + 凉拌黄瓜 + 杂粮饭"]},"老豆腐":{"category":"豆制品","calories":"每100g约80 kcal","storage":"买回来如果当天不吃，换干净的水泡着放冰箱冷藏，每天换水，可保存2-3天。如果没泡水直接放冰箱，表面会变干硬。","tips":"煎豆腐不粘锅的秘诀：豆腐表面用厨房纸吸干水分，锅要烧热，中小火慢煎，一面煎金黄了再翻。不要用嫩豆腐煎——嫩豆腐含水量太高，一进锅就碎。","dishes":["葱烧豆腐 + 清炒豆芽 + 杂粮饭","香煎豆腐 + 番茄蛋花汤"]},"嫩豆腐":{"category":"豆制品","calories":"每100g约50 kcal","storage":"盒装未开封冷藏保存，看包装日期。开封后吃不完换清水浸泡放冰箱，最多1天。","tips":"嫩豆腐也叫南豆腐、绢豆腐，口感滑嫩适合做汤和蒸。切的时候刀沾一下水不容易粘。入锅后不要大力搅拌，轻轻推动即可。","dishes":["番茄菌菇豆腐汤 + 凉拌木耳","味噌豆腐汤 + 凉拌海带丝"]},"金针菇":{"category":"菌菇","calories":"每100g约26 kcal","storage":"原包装不拆放冰箱冷藏，可保存3-5天。不要洗了再放——洗了容易烂。","tips":"切掉根部约2cm，掰散后清洗。炒之前焯水10秒可以去除土腥味。金针菇也叫\"明天见\"——因为消化不了，但不代表没营养哦。","dishes":["番茄菌菇豆腐汤 + 凉拌木耳"]},"口蘑":{"category":"菌菇","calories":"每100g约22 kcal","storage":"用厨房纸包住，放纸袋或透气容器里（不要用塑料袋！会闷出水），冰箱冷藏可保存3-5天。","tips":"清洗口蘑不要泡水！用湿厨房纸或软刷轻轻擦去表面泥土即可。口蘑切片后很容易氧化变色是正常的。炒口蘑等到水分收干、边缘焦黄时最香。","dishes":["口蘑炒鸡丁 + 白灼生菜 + 杂粮饭"]},"香菇":{"category":"菌菇","calories":"每100g约26 kcal（鲜）/ 300 kcal（干）","storage":"鲜香菇：纸袋装好冰箱冷藏，3-5天。干香菇：密封罐常温保存，放半年都可以。","tips":"鲜香菇选菌盖完整、边缘内卷的（全撑开的就老了）。干香菇用温水泡发30分钟，泡香菇的水不要倒掉——这是天然的鲜味剂！","dishes":["菌菇清汤 + 黄瓜炒鸡蛋"]},"蟹味菇":{"category":"菌菇","calories":"每100g约22 kcal","storage":"原包装放冰箱冷藏，3-5天。不需要提前处理，吃的时候切掉根部即可。","tips":"蟹味菇自带淡淡蟹味，做汤特别鲜。不要焯水太久，30秒即可。","dishes":["菌菇清汤 + 黄瓜炒鸡蛋"]},"冬瓜":{"category":"蔬菜","calories":"每100g约12 kcal（超级低卡）","storage":"整个没切开的冬瓜放在阴凉处可保存1个月。切开后切面用保鲜膜封好放冰箱冷藏，2-3天内吃完。","tips":"冬瓜选表皮有一层白霜的（那是天然蜡质）。切片的时候尽量切薄，容易煮熟也更入味。切太厚的话煮的时候会中间还是生的。","dishes":["冬瓜虾仁汤 + 蒜蓉西兰花"]},"菠菜":{"category":"蔬菜","calories":"每100g约28 kcal","storage":"厨房纸包住根部，保鲜袋封好冰箱冷藏，3-4天。菠菜很娇气，尽快吃。","tips":"菠菜一定要焯水！30秒即可，去除草酸，不然吃起来涩嘴。焯好的菠菜过冷水挤干，颜色更翠绿。","dishes":["蒸蛋羹 + 凉拌菠菜"]},"木耳（干）":{"category":"干货","calories":"每100g干约300 kcal（泡发后10g干≈50g湿，约30 kcal）","storage":"干木耳密封保存，放阴凉干燥处，可保存半年以上。泡发的木耳沥干水冷藏，不要超过24小时——泡太久的木耳会产生有害物质！","tips":"用温水泡发，20-30分钟即可。泡发后去蒂（硬的根部），撕成适口大小。凉拌木耳加醋更爽脆。","dishes":["番茄菌菇豆腐汤 + 凉拌木耳"]},"紫菜":{"category":"干货","calories":"每100g约264 kcal（每次3g仅约8 kcal）","storage":"密封袋装好，放阴凉干燥处，避免受潮。紫菜吸潮后会变软失去脆感，但营养不受影响。","tips":"紫菜蛋花汤的紫菜不要煮太久，撕碎后放入沸腾的汤里，10秒就可以关火了。","dishes":["白灼虾 + 紫菜蛋花汤"]},"三文鱼":{"category":"海鲜","calories":"每100g约208 kcal","storage":"冷藏保存最多1天。买回来当天不吃的话，用保鲜膜裹紧放冷冻，可保存1个月。解冻放冷藏室慢慢解冻，不要用热水或微波炉。","tips":"买三文鱼看颜色：橙红色有光泽的更新鲜。用手指轻按鱼肉，有弹性能回弹的好。表面干了或发粘就别买了。","dishes":["三文鱼杂粮饭沙拉碗"]},"味噌酱":{"category":"调味品","calories":"每100g约200 kcal（每次15g约30 kcal）","storage":"开封后密封冷藏，每次取用时用干净干燥的勺子，可保存3-6个月。","tips":"味噌绝对不能煮沸！关火后再加，用余温融化，煮沸会破坏味噌的酵素和风味。白味噌偏甜适合汤，红味噌偏咸适合炖煮。","dishes":["味噌豆腐汤 + 凉拌海带丝","唐扬炸鸡块 + 味噌汤 + 白米饭"]},"海带（干）":{"category":"干货","calories":"每100g干约262 kcal（每次5g仅约13 kcal）","storage":"密封袋装好放阴凉干燥处，可保存半年以上。","tips":"干海带表面有白色粉末是甘露醇，不是发霉——那是天然的鲜味物质，不用洗掉。泡发时间不要太长，15-20分钟变软即可。","dishes":["味噌豆腐汤 + 凉拌海带丝"]},"青椒":{"category":"蔬菜","calories":"每100g约22 kcal","storage":"不要洗，厨房纸包住放保鲜袋冰箱冷藏，可保存1周。","tips":"怕辣选大青椒（灯笼椒），想要微微辣选尖椒。青椒大火快炒才能保持脆感和翠绿。","dishes":["青椒牛柳 + 凉拌黄瓜 + 杂粮饭"]},"豆芽（绿豆芽）":{"category":"蔬菜","calories":"每100g约18 kcal","storage":"买回来放碗里加水没过豆芽，冷藏保存，每天换水，可保存2-3天。不要沥干放，会蔫。","tips":"豆芽大火快炒，全程不超过2分钟。炒太久会出水变软，失去脆爽口感。豆芽根部如果发黑就掐掉。","dishes":["葱烧豆腐 + 清炒豆芽 + 杂粮饭"]},"南瓜":{"category":"主食","calories":"每100g约26 kcal","storage":"整个未切开的南瓜放在阴凉通风处可保存1-2个月。切开后用保鲜膜包好冷藏，1周内吃完。","tips":"选外皮硬、颜色深、拿在手里沉甸甸的。南瓜籽不要扔，洗净晒干可以烤着吃（虽然是减脂版不推荐）。","dishes":["小米南瓜粥 + 煮鸡蛋"]},"小米":{"category":"主食","calories":"每100g约358 kcal（每次40g约143 kcal）","storage":"密封罐装好，阴凉干燥处保存。小米容易长虫，可以在罐子里放几颗花椒粒驱虫。","tips":"小米淘洗时不要用力搓，轻轻搅拌2遍即可。煮小米粥时水要一次加够，中间加水会影响口感。","dishes":["小米南瓜粥 + 煮鸡蛋"]},"奇亚籽":{"category":"种子","calories":"每100g约486 kcal（每次1茶匙约30 kcal）","storage":"密封常温保存，避免受潮。","tips":"奇亚籽吸水会膨胀成凝胶状，是天然的增稠剂。泡牛奶/酸奶里需要充分搅拌，不然会结块。不需要打碎，直接吃就行。","dishes":["隔夜燕麦杯"]},"排骨":{"category":"肉类","calories":"每100g约264 kcal","storage":"冷藏不超过2天。冷冻分装可保存1个月。解冻提前一晚放冷藏。","tips":"焯水要冷水下锅，热水下锅血水锁在里面出不来。焯完水要用温水冲洗，用冷水冲肉会紧缩变柴。选小排（肋排）肉嫩骨头多，适合红烧。","dishes":["红烧排骨 + 蒜蓉西兰花 + 白米饭"]},"牛腩":{"category":"肉类","calories":"每100g约250 kcal","storage":"冷藏不超过2天，冷冻分装可保存1个月。","tips":"牛腩需要长时间炖煮才能软烂。炖的时候保持小火微沸即可，大火会让肉质变老。加一点茶叶或山楂干可以加速牛肉变软。","dishes":["土豆炖牛肉 + 凉拌黄瓜 + 白米饭"]},"土豆":{"category":"主食","calories":"每100g约81 kcal","storage":"不要放冰箱！低温会让土豆淀粉转化成糖，口感变甜还会变黑。放在阴凉避光处，和苹果放一起可以抑制发芽。","tips":"发芽的土豆不能吃！含有龙葵素有毒。即使挖掉芽眼，毒素可能已经扩散到整个土豆，不要冒险。表皮发绿的说明晒过太阳，龙葵素升高也不建议吃。","dishes":["土豆炖牛肉 + 凉拌黄瓜 + 白米饭"]},"鲈鱼":{"category":"海鲜","calories":"每100g约105 kcal","storage":"鲜鱼买回来当天吃。冷藏最多1天。不马上吃的话清理干净后用保鲜膜包好冷冻。","tips":"蒸鱼的时候，蒸出来的腥水一定要倒掉！这是去腥最关键的一步。鱼身上划三刀帮助入味和均匀受热。","dishes":["清蒸鲈鱼 + 清炒时蔬 + 白米饭"]},"鸡腿肉":{"category":"肉类","calories":"每100g约181 kcal（带皮）","storage":"冷藏不超过2天，冷冻分装可保存1个月。","tips":"鸡腿肉比鸡胸肉多汁，因为脂肪含量略高（但比猪牛肉都低）。去骨小技巧：沿着骨头用刀划开，贴着骨头削下肉，比直接剁容易。","dishes":["唐扬炸鸡块 + 味噌汤 + 白米饭","日式亲子丼（鸡肉鸡蛋盖饭）"]},"意大利面":{"category":"主食","calories":"每100g干面约350 kcal（100g干面煮好后约200g）","storage":"密封常温保存，开封后夹子夹紧袋子。不用担心过期，干燥环境下保质期很长。","tips":"煮意面的水要像海水一样咸——1升水加7-10g盐。煮好的面水不要全倒掉，留一小杯，炒面时加一点能让酱汁更好地裹在面上。","dishes":["蒜香意大利面 + 煎虾仁 + 蔬菜沙拉"]},"橄榄油":{"category":"调味品","calories":"每100ml约900 kcal（每次1茶匙约45 kcal）","storage":"避光密封保存，不要放在灶台旁（高温会加速氧化）。开封后6个月内风味最佳。","tips":"初榨橄榄油适合凉拌和低温烹饪，精炼橄榄油可以高温煎炒。真橄榄油放冰箱会变浑浊甚至凝固，这是正常的。","dishes":["蒜香意大利面 + 煎虾仁 + 蔬菜沙拉"]},"可颂面包":{"category":"主食","calories":"每100g约406 kcal（1个约250 kcal）","storage":"当天买当天吃口感最好。吃不完的密封常温保存到第二天。冷冻可以保存2周，吃之前烤箱复烤5分钟恢复酥脆。","tips":"好可颂的标准：外层酥脆，内部蜂窝状分层明显。用手一捏有清脆的声音说明新鲜。","dishes":["火腿芝士可颂 + 水果酸奶杯"]},"白米饭":{"category":"主食","calories":"每100g熟饭约116 kcal（1碗约150g = 174 kcal）","storage":"煮好的饭放凉后分装冷冻，可保存2周。吃的时候微波炉加热2-3分钟。冷藏的白米饭会变干硬，不好吃。","tips":"煮饭加水的黄金比例：米:水 = 1:1.2（指关节第一节能碰到米再碰到水的水量差不多）。滴几滴油米饭更光亮。","dishes":["红烧排骨 + 蒜蓉西兰花 + 白米饭","唐扬炸鸡块 + 味噌汤 + 白米饭","土豆炖牛肉 + 凉拌黄瓜 + 白米饭","日式亲子丼（鸡肉鸡蛋盖饭）","清蒸鲈鱼 + 清炒时蔬 + 白米饭"]},"胡萝卜":{"category":"蔬菜","calories":"每100g约39 kcal","storage":"厨房纸包住，保鲜袋冷藏，可保存2周。如果胡萝卜变软了，泡冰水里15分钟就能恢复脆度。","tips":"胡萝卜素是脂溶性的，用油炒一下吸收更好。但也不是必须——和含脂肪的食物一起吃也能吸收。","dishes":["土豆炖牛肉 + 凉拌黄瓜 + 白米饭"]},"洋葱":{"category":"蔬菜","calories":"每100g约40 kcal","storage":"整个洋葱放在阴凉通风处（不要放冰箱！），可保存2-4周。切开后用保鲜膜包好冷藏，2-3天内吃完。","tips":"切洋葱不流泪的技巧：1）切之前放冰箱冷藏15分钟 2）刀沾水 3）最后切根部（辣味物质集中在根部）。","dishes":["土豆炖牛肉 + 凉拌黄瓜 + 白米饭","日式亲子丼（鸡肉鸡蛋盖饭）"]},"香蕉":{"category":"水果","calories":"每100g约93 kcal（1根约100-120 kcal）","storage":"常温保存，不要放冰箱（冰箱会让香蕉皮变黑，果肉变粉）。如果一次买了太多，剥皮后冷冻做smoothie用。","tips":"香蕉释放乙烯催熟其他水果，所以不要和想保存久的水果放一起。皮上有小黑点的时候最甜。","dishes":["火腿芝士可颂 + 水果酸奶杯"]},"生抽":{"category":"调味品","calories":"每100ml约80 kcal（每次10ml约8 kcal）","storage":"常温密封保存，开封后建议3-6个月内用完，风味会随时间变淡。","tips":"生抽和老抽的区别：生抽咸味重颜色浅，适合炒菜调味；老抽颜色深咸味轻，适合红烧上色。我们菜谱里大部分用的是生抽。","dishes":["几乎所有菜都会用到，就不列了"]},"蚝油":{"category":"调味品","calories":"每100g约100 kcal（每次10g约10 kcal）","storage":"开封后必须冷藏！蚝油含蛋白质，常温会变质。瓶口擦干净再盖盖。","tips":"蚝油不适合高温久煮，最好在出锅前加入翻炒一下就好，否则鲜味会被破坏。","dishes":["番茄炒蛋 + 蚝油生菜 + 杂粮饭","口蘑炒鸡丁 + 白灼生菜 + 杂粮饭","葱烧豆腐 + 清炒豆芽 + 杂粮饭"]},"姜":{"category":"调味品","calories":"每100g约41 kcal（每次几片几乎不计）","storage":"不要洗，用厨房纸包好放保鲜袋冷藏，可保存2-3周。另一种方法：埋进干沙子里（或放冷冻室），用的时候刨一点。","tips":"姜皮不要削，用勺子刮掉就可以了——皮薄姜肉更多。受寒了喝姜汤，但晚上尽量少吃姜（老话说\"晚上吃姜如砒霜\"虽然夸张但有道理——姜会让人兴奋影响睡眠）。","dishes":["冬瓜虾仁汤 + 蒜蓉西兰花","白灼虾 + 紫菜蛋花汤","红烧排骨 + 蒜蓉西兰花 + 白米饭","清蒸鲈鱼 + 清炒时蔬 + 白米饭"]},"蒜":{"category":"调味品","calories":"每100g约128 kcal（每次2-3瓣仅约10 kcal）","storage":"整头大蒜放在阴凉通风处（不要放冰箱），可保存1-2个月。掰开的蒜瓣用网袋挂着。发芽的蒜还能吃但口感会变柴。","tips":"拍一下再剥蒜又快又方便。爆香蒜末时油温不要太高——蒜末变黑就会发苦。如果忘了剥蒜，微波炉叮10秒也能轻松去皮。","dishes":["几乎所有蒜蓉菜都用"]},"玉米":{"category":"主食","calories":"每100g约112 kcal（1根中等玉米约140 kcal）","storage":"带皮玉米放冰箱冷藏可保存3-5天。剥了皮的用保鲜膜包好冷藏，2-3天。如果买多了，剥皮后整根冷冻可保存1个月。","tips":"水果玉米甜脆适合蒸，糯玉米软糯适合煮。选玉米看须——玉米须湿润有光泽说明新鲜。蒸的时候留两层内皮，更香更甜。","dishes":["蒸玉米 + 茶叶蛋 + 小番茄"]},"紫薯":{"category":"主食","calories":"每100g约82 kcal","storage":"阴凉通风处保存（不要放冰箱！），1-2周。表皮有黑斑或发软就尽快吃掉。蒸熟后冷藏可保存3天。","tips":"紫薯比红薯更粉更甜，天然花青素含量高（紫色的来源）。切开后切口会变黑是正常的氧化现象。紫薯的紫色煮了会溶到水里——别慌。","dishes":["紫薯燕麦碗 + 无糖酸奶"]},"速冻饺子":{"category":"速冻食品","calories":"每100g约200-250 kcal（8-10个约350 kcal）","storage":"冷冻保存，看包装保质期（通常6-12个月）。注意不要让饺子反复解冻再冻——拿出来直接蒸或煮。","tips":"素馅（韭菜鸡蛋、白菜香菇）比肉馅热量低不少。蒸的比水煮的更有嚼劲，而且皮不容易破。","dishes":["蒸素饺子（韭菜鸡蛋馅）+ 豆浆"]},"荞麦面":{"category":"主食","calories":"每100g干约340 kcal（60g干面约200 kcal）","storage":"密封常温干燥保存，开封后用夹子夹紧袋子口。","tips":"荞麦面GI值比白面条低，减脂期比普通面条友好很多。煮的时候水要多，煮3-4分钟即可，荞麦面容易煮烂。买的时候看配料表——第一位应该是荞麦粉，小麦粉排前面的是\"荞麦味面\"。","dishes":["荞麦面卧鸡蛋"]},"红茶包":{"category":"饮品","calories":"每包约0-2 kcal","storage":"密封常温保存，放阴凉干燥处。开封后夹紧封口。","tips":"煮茶叶蛋用红茶比绿茶好——红茶颜色深、涩味刚好能渗透进蛋里。普洱也可以。不要用花茶或者水果茶。","dishes":["蒸玉米 + 茶叶蛋 + 小番茄","茶叶蛋 + 小米南瓜粥 + 油饼"]},"八角":{"category":"香料","calories":"每100g约281 kcal（每次1-2个几乎不计）","storage":"密封罐常温保存，放在阴凉处可保存很久。如果受潮了，太阳晒一下或烤箱低温烘一下即可。","tips":"八角是红烧、卤味的灵魂香料。每颗八角有8个角（所以叫\"八角\"），选角饱满完整、颜色棕红的。炖肉时放1-2颗就够。","dishes":["蒸玉米 + 茶叶蛋 + 小番茄","红烧排骨 + 蒜蓉西兰花 + 白米饭","红烧肉 + 清炒时蔬 + 白米饭"]},"小番茄（圣女果）":{"category":"水果/蔬菜","calories":"每100g约22 kcal","storage":"不要洗，原盒放冰箱冷藏，吃多少洗多少。可保存5-7天。","tips":"小番茄比大番茄更甜，当零食吃也很棒。减脂期嘴馋了来一把毫无负担。","dishes":["蒸玉米 + 茶叶蛋 + 小番茄","三文鱼杂粮饭沙拉碗"]},"螺丝椒":{"category":"蔬菜","calories":"每100g约26 kcal","storage":"不要洗，厨房纸包好保鲜袋冷藏，可保存1周。","tips":"螺丝椒是湘菜的灵魂——表皮皱皱的、弯弯的像螺丝。比普通青椒更有辣味和香气。干煸到虎皮斑出现，辣椒的焦香是炒肉的精髓。怕太辣就把白色筋络和籽去干净。","dishes":["辣椒炒肉（正宗版）+ 白米饭","农家小炒肉 + 清炒豆角 + 白米饭","擂辣椒皮蛋 + 炒蛋 + 白米饭","少油版辣椒炒蛋 + 杂粮饭"]},"剁椒":{"category":"调味品","calories":"每100g约50-80 kcal（每次1汤匙约15 kcal）","storage":"市售瓶装剁椒开封后盖紧瓶盖冷藏，取用时用干净干燥的勺子。自制剁椒密封冷藏可保存1-2个月。","tips":"湖南人家里必备。红剁椒偏咸香，青剁椒偏鲜辣。做剁椒鱼头一定要用红剁椒！如果剁椒太咸，用水冲一下挤干再使用。","dishes":["蒜蓉剁椒蒸鸡胸 + 清炒空心菜 + 杂粮饭","湖南米粉（肉丝码子）","剁椒鱼头 + 白米饭"]},"空心菜":{"category":"蔬菜","calories":"每100g约23 kcal","storage":"厨房纸包住根部（吸水），保鲜袋冷藏，2-3天。空心菜很娇气，蔫了就不好吃了，买了尽快吃。","tips":"空心菜也叫蕹菜（weng cai），是湖南夏天餐桌上的\"绿色霸主\"。掐掉老梗（根部约5cm），大火快炒不超过2分钟。炒久了会出水变黑。加蒜是标配！","dishes":["蒜蓉剁椒蒸鸡胸 + 清炒空心菜 + 杂粮饭","小炒黄牛肉 + 蒜蓉空心菜 + 白米饭","清炒空心菜 + 番茄蛋花汤"]},"小米辣":{"category":"蔬菜","calories":"每100g约40 kcal（每次几个几乎不计）","storage":"不要洗，厨房纸包好保鲜袋冷藏，可保存1-2周。也可以直接冷冻（冷冻后切的时候方便，味道不变）。","tips":"小米辣是湘菜和川菜的灵魂，个头小但辣度极高。处理完小米辣不要揉眼睛！手会很辣，用肥皂和冷水彻底洗手（热水会让辣椒素渗透更深）。","dishes":["小炒黄牛肉（少油版）+ 蒜蓉西兰花 + 杂粮饭","小炒黄牛肉 + 蒜蓉空心菜 + 白米饭"]},"豆豉":{"category":"调味品","calories":"每100g约260 kcal（每次半汤匙约15 kcal）","storage":"市售袋装豆豉开封后密封冷藏，取用时用干净干燥的勺子，可保存很久。","tips":"豆豉是发酵黑豆，湖南浏阳豆豉非常出名。辣椒炒肉放一点豆豉是标准配置——豆豉的咸鲜和辣椒的焦香是天生一对。","dishes":["辣椒炒肉（正宗版）+ 白米饭","豆豉蒸排骨（减脂版）+ 白灼生菜 + 杂粮饭"]},"龙利鱼柳（巴沙鱼）":{"category":"海鲜","calories":"每100g约80 kcal","storage":"冷冻保存，看包装保质期。不要反复解冻。解冻放冷藏室或用冷水浸泡，不要用热水。","tips":"龙利鱼和巴沙鱼经常被混着卖——龙利鱼是海鱼更贵，巴沙鱼是淡水养殖更便宜。两者都没有小刺，肉质嫩滑。煮汤时鱼肉一变色就熟了，煮久了会散。","dishes":["番茄龙利鱼 + 清炒豆芽 + 杂粮饭"]},"长茄子":{"category":"蔬菜","calories":"每100g约23 kcal","storage":"厨房纸包好，保鲜袋冷藏，3-5天。茄子怕冷，不要放冰箱最冷的地方。","tips":"长茄子比圆茄子更嫩，皮薄肉细，适合蒸和凉拌。蒸茄子最健康——不放油也能很香。蒸之前不要切开，蒸好再手撕——这样汁水不会流失。","dishes":["蒜蓉蒸茄子 + 凉拌鸡丝 + 杂粮饭","蒜蓉蒸茄子 + 紫菜蛋花汤"]},"韭菜":{"category":"蔬菜","calories":"每100g约26 kcal","storage":"厨房纸包好，保鲜袋冷藏，2-3天。韭菜味道大，放冰箱单独包好不然整个冰箱都是韭菜味。","tips":"春天的韭菜最嫩最香——\"春韭秋菘\"。韭菜含水量大，炒之前一定要沥干水分。大火快炒，一出水就老了。和鸡蛋是天生一对。","dishes":["韭菜炒鸡蛋 + 凉拌木耳 + 杂粮饭","蒸素饺子（韭菜鸡蛋馅）+ 豆浆"]},"皮蛋":{"category":"蛋类","calories":"每100g约171 kcal（1个皮蛋约80 kcal）","storage":"未剥壳的皮蛋常温阴凉处保存，可保存几个月。剥了壳的冷藏，当天吃完。","tips":"好皮蛋表面有松花状的结晶（所以也叫\"松花蛋\"）。剥壳后蛋白呈琥珀色半透明、蛋黄墨绿色流心的是上品。皮蛋可以和豆腐一起凉拌，也可以做擂辣椒皮蛋。","dishes":["擂辣椒皮蛋 + 炒蛋 + 白米饭","上汤娃娃菜 + 蒸鸡蛋羹"]},"娃娃菜":{"category":"蔬菜","calories":"每100g约13 kcal","storage":"保鲜袋装好冷藏，3-5天。外层叶子如果发黄就剥掉，里面还是好的。","tips":"娃娃菜是缩小版大白菜，但更甜更嫩。上汤娃娃菜是粤菜经典——加点皮蛋和火腿丁，不用放味精就很鲜。","dishes":["上汤娃娃菜 + 蒸鸡蛋羹"]},"魔芋丝":{"category":"主食替代","calories":"每100g约10 kcal（几乎零卡！）","storage":"未拆封的袋装魔芋丝常温保存（看保质期）。拆封后换清水泡着冷藏，每天换水，3天内吃完。","tips":"魔芋丝是减脂神器——95%以上是水和膳食纤维。本身没有味道，全靠调味。打开有碱味是正常的，焯水1分钟就没了。","dishes":["酸辣魔芋丝 + 凉拌黄瓜"]},"猪五花肉":{"category":"肉类","calories":"每100g约350 kcal","storage":"冷藏不超过2天，冷冻分装可保存1个月。","tips":"选三层肥两层瘦、肥瘦分明的五花肉——\"五花三层\"是极品。做红烧肉或小炒肉时，把多余的猪油逼出来，剩下的肉肥而不腻。","dishes":["农家小炒肉 + 清炒豆角 + 白米饭","红烧肉 + 清炒时蔬 + 白米饭","干锅花菜 + 炒蛋 + 白米饭"]},"猪里脊":{"category":"肉类","calories":"每100g约155 kcal","storage":"冷藏不超过2天，冷冻分装可保存1个月。","tips":"猪里脊是猪身上最嫩的部位，位于脊椎两侧。水煮肉片用里脊肉最嫩。切的时候顺着纹路切片（和牛肉相反！猪里脊顺着纹路切更嫩）。","dishes":["水煮肉片 + 白米饭"]},"猪前腿肉":{"category":"肉类","calories":"每100g约200 kcal（肥瘦混合）","storage":"冷藏不超过2天，冷冻分装可保存1个月。","tips":"做辣椒炒肉选前腿肉——比五花肉瘦、比里脊肉有油香。前腿肉肥瘦比例约3:7，炒出来既有肉香又不会太腻。","dishes":["辣椒炒肉（正宗版）+ 白米饭"]},"湖南米粉（干/鲜）":{"category":"主食","calories":"每100g鲜米粉约110 kcal","storage":"干米粉密封常温保存。鲜米粉冷藏2-3天（鲜米粉容易馊，尽快吃）。鲜米粉可以冷冻分装保存1个月。","tips":"湖南人吃粉分圆粉和扁粉——长沙偏爱扁粉，常德偏爱圆粉。干米粉煮之前泡冷水30分钟再煮更软。正宗的湖南米粉码子（浇头）是灵魂，码子一定要现炒。","dishes":["湖南米粉（肉丝码子）"]},"油条":{"category":"主食","calories":"每100g约386 kcal（1根约200 kcal）","storage":"当天买当天吃——油条放久了就不酥了。吃不完的冷冻保存，吃之前烤箱或空气炸锅复热。不要冷藏！冷藏会让油条变韧。","tips":"好油条的标准：外酥内空，掰开有大气孔。泡豆浆3秒捞起——外软内酥。油条热量高，减脂期少吃但女朋友可以放心吃。","dishes":["豆浆 + 油条"]},"速冻馄饨":{"category":"速冻食品","calories":"每100g约220 kcal（12-15个约350 kcal）","storage":"冷冻保存，不要反复解冻。","tips":"煮馄饨加冷水\"点三次\"：水开后下馄饨，每沸腾一次加一小碗冷水，三次后馄饨就好了。汤里放紫菜虾皮是标配。","dishes":["鲜肉馄饨"]},"虾皮":{"category":"干货","calories":"每100g约153 kcal（每次几克几乎不计）","storage":"密封罐常温保存，放阴凉干燥处。开封后最好3个月内用完，时间长了香味会变淡。","tips":"虾皮是天然味精——一小撮就能让汤鲜味提升一个档次。紫菜蛋花汤和馄饨汤里放一点。虾皮有好几种：白虾皮（最嫩）、红虾皮（味道浓）。","dishes":["鲜肉馄饨"]},"榨菜":{"category":"腌制品","calories":"每100g约30-40 kcal（每次几根几乎不计）","storage":"袋装榨菜未开封常温保存。开封后没吃完的放小碗里加水泡着冷藏（防止变干），2-3天内吃完。","tips":"榨菜是早餐配粥的绝配。乌江榨菜和涪陵榨菜最有名。咸度较高，一次别吃太多。","dishes":["小笼包 + 豆腐脑","茶叶蛋 + 小米南瓜粥 + 油饼"]},"泡椒":{"category":"调味品","calories":"每100g约30 kcal","storage":"瓶装泡椒开封后盖紧冷藏，取用时用干净干燥的筷子。","tips":"泡椒是小炒黄牛肉的标配——用野山椒（黄色小米辣泡的）最正宗。泡椒的酸辣和新鲜辣椒的热辣不一样，层次更丰富。","dishes":["小炒黄牛肉 + 蒜蓉空心菜 + 白米饭","小炒黄牛肉（少油版）+ 蒜蓉西兰花 + 杂粮饭"]},"花鲢鱼头（胖头鱼头）":{"category":"海鲜","calories":"每100g约100 kcal","storage":"鲜鱼头当天吃。冷藏不超过1天。买回来马上做最好。","tips":"花鲢也叫胖头鱼、鳙鱼，鱼头特别大所以叫\"胖头\"。做剁椒鱼头用花鲢鱼头最经典。鱼鳃和黑膜一定要刮干净，这是腥味的主要来源。","dishes":["剁椒鱼头 + 白米饭"]},"蒸鱼豉油":{"category":"调味品","calories":"每100ml约100 kcal（每次1汤匙约10 kcal）","storage":"开封后盖紧瓶盖常温保存即可。","tips":"蒸鱼豉油和普通生抽不一样——蒸鱼豉油更鲜甜，专门为蒸鱼设计。做剁椒鱼头时加一点蒸鱼豉油味道更正。","dishes":["剁椒鱼头 + 白米饭","清蒸鲈鱼 + 清炒时蔬 + 白米饭"]},"湖南腊肉":{"category":"肉类","calories":"每100g约400 kcal","storage":"整块腊肉挂在通风处，或密封冷藏。切片的腊肉密封冷冻可保存3个月。","tips":"湖南腊肉和广式腊肉不一样——湖南腊肉是烟熏的，有独特的烟熏香气。腊肉一定要先煮一下：去咸味、去烟熏的硬表皮、也让肉变软好切。煮完腊肉的水不要用。","dishes":["蒜苗炒腊肉 + 清炒小白菜 + 白米饭"]},"蒜苗":{"category":"蔬菜","calories":"每100g约40 kcal","storage":"厨房纸包好，保鲜袋冷藏，3-5天。蒜苗味道大，单独包好。","tips":"蒜苗是大蒜长出来的绿叶，也叫青蒜。白色茎部和绿色叶部分开下锅——茎部需要多炒一会儿。蒜苗炒腊肉是经典搭配。","dishes":["蒜苗炒腊肉 + 清炒小白菜 + 白米饭"]},"酸豆角":{"category":"腌制菜","calories":"每100g约30 kcal","storage":"市售袋装密封冷藏。自制酸豆角密封冷藏可保存1-2个月，取用时用干净干燥的筷子。","tips":"酸豆角是湖南米粉的灵魂配菜！酸酸辣辣的口感和肉末是绝配。如果太咸，用清水泡10分钟去咸味。自己在家也能腌：豆角 + 盐 + 水，密封发酵3-5天。","dishes":["酸豆角炒肉末 + 炒蛋 + 白米饭","湖南米粉（肉丝码子）"]},"郫县豆瓣酱":{"category":"调味品","calories":"每100g约100-150 kcal（每次1汤匙约15-20 kcal）","storage":"开封后盖紧瓶盖冷藏，取用时用干净干燥的勺子。豆瓣酱含盐量高不易变质，冷藏可保存很久。","tips":"郫县豆瓣酱是川菜之魂——水煮肉片、麻婆豆腐、回锅肉都靠它。炒豆瓣酱一定要小火慢炒，把红油逼出来。火大了豆瓣酱会苦。","dishes":["水煮肉片 + 白米饭"]},"花椒":{"category":"香料","calories":"每100g约300 kcal（每次几克几乎不计）","storage":"密封罐常温保存，放阴凉处。花椒的麻味来自花椒麻素，时间久了麻味会减弱，建议开封后半年内用完。","tips":"红花椒偏麻，青花椒偏香（藤椒是青花椒的一种）。炸花椒油时一定要小火——花椒炸糊了会发苦。","dishes":["水煮肉片 + 白米饭"]},"干辣椒":{"category":"香料","calories":"每100g约300 kcal（每次几个几乎不计）","storage":"密封罐常温保存，放阴凉干燥处。不受潮可以保存很久。如果受潮了晒一晒即可。","tips":"不同的干辣椒用途不同：朝天椒最辣、二荆条最香、灯笼椒颜色最红。炸辣椒油时注意火候——辣椒变深红立刻离火，多一秒就糊了。","dishes":["水煮肉片 + 白米饭","干锅花菜 + 炒蛋 + 白米饭","酸豆角炒肉末 + 炒蛋 + 白米饭","蒜苗炒腊肉 + 清炒小白菜 + 白米饭"]},"蒸肉粉":{"category":"调味品","calories":"每100g约300 kcal","storage":"密封常温保存，放阴凉干燥处。","tips":"蒸肉粉就是米粉 + 五香粉等香料的混合物。超市有卖现成的（推荐\"孔师傅\"、\"好人家\"等品牌）。五香味的蒸什么都行，麻辣味的蒸排骨特别好吃。","dishes":["粉蒸排骨 + 凉拌黄瓜 + 白米饭"]},"桂皮":{"category":"香料","calories":"每100g约260 kcal（每次一小块几乎不计）","storage":"密封罐常温保存，放阴凉处，可以保存很久。","tips":"桂皮是肉桂树的树皮——和肉桂粉是同一种东西的不同形态。炖肉放一小块桂皮，去腥增香。桂皮味道浓郁，一次不要放太多，1小块就够。","dishes":["红烧肉 + 清炒时蔬 + 白米饭"]},"香菜":{"category":"蔬菜/香草","calories":"每100g约23 kcal","storage":"根部用湿厨房纸包住，保鲜袋冷藏，3-5天。","tips":"香菜（芫荽）有人爱有人恨——这是基因决定的。香菜在湘菜中是灵魂点缀，小炒黄牛肉出锅前撒一把香菜，翻两下就关火。","dishes":["小炒黄牛肉 + 蒜蓉空心菜 + 白米饭"]},"猪骨":{"category":"肉类","calories":"每100g约200 kcal（主要是骨髓中的脂肪）","storage":"冷藏不超过2天，冷冻分装可保存1个月。","tips":"筒子骨熬汤最香（骨髓多），脊骨和扇骨肉多。熬骨头汤时加点醋（1小勺）能帮助钙溶出。熬汤全程小火保持微沸，汤才会清不会浑浊。","dishes":["湖南米粉（肉丝码子）——用于汤底"]},"生粉（淀粉）":{"category":"调味品","calories":"每100g约350 kcal（每次1茶匙约10 kcal）","storage":"密封常温保存，放干燥处。受潮结块了就不能用了。","tips":"生粉（玉米淀粉/土豆淀粉）的作用：腌肉时加一点让肉更嫩（水煮肉片的嫩滑秘诀）；勾芡时让汤汁变浓稠。土豆淀粉勾芡透明度高，玉米淀粉勾芡浓稠度高。","dishes":["豆豉蒸排骨（减脂版）+ 白灼生菜 + 杂粮饭","水煮肉片 + 白米饭"]},"蛋清":{"category":"蛋类","calories":"1个蛋清约17 kcal","storage":"分离出的蛋清密封冷藏，1-2天内用完。也可以冷冻保存1个月。","tips":"蛋清腌肉是最天然的嫩肉剂——水煮肉片腌肉时加半个蛋清抓匀，肉片滑嫩不柴。分离蛋清最简单的方法：鸡蛋磕开后在两半蛋壳之间来回倒。","dishes":["水煮肉片 + 白米饭"]}}</script>
