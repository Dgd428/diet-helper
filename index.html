<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="饮食助手">
<meta name="theme-color" content="#7c6fcf">
<link rel="manifest" href="data:application/json,{%22name%22:%22%E9%A5%AE%E9%A3%9F%E5%8A%A9%E6%89%8B%22,%22short_name%22:%22%E9%A5%AE%E9%A3%9F%E5%8A%A9%E6%89%8B%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23fbf7f3%22,%22theme_color%22:%22%237c6fcf%22,%22orientation%22:%22portrait%22,%22icons%22:[{%22src%22:%22icon.svg%22,%22sizes%22:%22any%22,%22type%22:%22image/svg+xml%22}]}">
<title>饮食助手</title>
<meta name="Cache-Version" content="5">
<style>
:root {
  --bg: #fafaf8;
  --card: #fff;
  --card-tint: #fefdfb;
  --text: #2d2640;
  --muted: #7a6e8e;
  --hint: #b8aed0;
  --border: #e8e6e1;
  --shadow: 0 2px 12px rgba(0,0,0,0.04);
  --radius: 20px;
  --radius-sm: 14px;

  /* Brand - dreamy purple */
  --purple: #7c6fcf; --purple-light: #ede8fb; --purple-text: #483f80;

  /* Person card colors */
  --card-diet-bg: #edf9e8;
  --card-diet-border: #b8dfa8;
  --card-diet-glow: rgba(109,184,93,0.12);
  --card-normal-bg: #fff6eb;
  --card-normal-border: #f5d4a0;
  --card-normal-glow: rgba(240,165,74,0.12);

  /* Time period colors */
  --breakfast: #fff6eb; --breakfast-accent: #f0a54a; --breakfast-text: #7d501f;
  --lunch: #edf8e8; --lunch-accent: #6db85d; --lunch-text: #2f5c1e;
  --dinner: #fef0ee; --dinner-accent: #e87d73; --dinner-text: #732d27;
  --fasting: #eef1f9; --fasting-accent: #6e7fb8; --fasting-text: #333b60;

  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { font-size: 17px; }

/* Hide scrollbars globally but keep scroll */
*::-webkit-scrollbar { display: none; }
* { -ms-overflow-style: none; scrollbar-width: none; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Status Bar */
.status-bar {
  padding: 28px 28px 14px;
  display: flex; align-items: flex-end;
  position: sticky; top:0; z-index: 10;
  background: linear-gradient(to bottom, var(--bg) 80%, transparent);
}
.status-bar .time {
  font-size: 38px; font-weight: 450; letter-spacing: 4px;
  line-height: 1; color: var(--text);
  font-variant-numeric: tabular-nums;
}
.status-bar .date { font-size: 14px; color: var(--muted); margin-top: 4px; letter-spacing: 1px; text-align: right; font-weight: 400; }
.status-bar .left-group { margin-right: auto; display: inline-block; }
.status-bar .period-tag {
  font-size: 22px; padding: 10px 28px; border-radius: 26px;
  font-weight: 700; letter-spacing: 1px;
  transition: all 0.5s ease; flex-shrink: 0;
  position: absolute; left: 50%; transform: translateX(-50%);
}
.period-breakfast .period-tag { background: var(--breakfast); color: var(--breakfast-text); }
.period-lunch .period-tag { background: var(--lunch); color: var(--lunch-text); }
.period-dinner .period-tag { background: var(--dinner); color: var(--dinner-text); }
.period-fasting .period-tag { background: var(--fasting); color: var(--fasting-text); }

.cart-icon {
  font-size: 20px; cursor: pointer; opacity: 0.5; transition: opacity 0.2s;
  position: absolute; right: 88px; top: 50%; transform: translateY(-50%);
}
.cart-icon:hover { opacity: 1; }

/* Ingredient Library */
.ing-overlay {
  position: fixed; inset: 0; background: rgba(30,20,50,0.2); z-index: 150;
  display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(2px);
}
.ing-sheet {
  background: var(--card); width: 100%; max-width: 560px; margin: 20px;
  border-radius: 24px; padding: 24px 20px 20px;
  max-height: 70vh; overflow-y: auto;
  animation: ingPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  transform-origin: bottom center;
  box-shadow: 0 8px 40px rgba(120,100,180,0.12);
}
@keyframes ingPop {
  from { transform: scale(0.7) translateY(60px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}
.ing-lib-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
.ing-lib-item {
  padding: 10px 14px; border-radius: 12px; font-size: 14px; cursor: pointer;
  transition: all 0.2s; border: 0.5px solid var(--border);
  background: var(--bg);
}
.ing-lib-item:hover { background: var(--purple-light); color: var(--purple); border-color: var(--purple); transform: scale(1.03); }
.ing-lib-item .cat { font-size: 10px; color: var(--hint); margin-top: 2px; }

/* Settings FAB */
.settings-fab {
  position: fixed; bottom: 28px; right: 28px; z-index: 15;
  width: 48px; height: 48px; border-radius: 50%;
  border: 0.5px solid var(--border); background: var(--card);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--muted); transition: all 0.3s;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.settings-fab:hover {
  background: var(--purple-light); color: var(--purple);
  border-color: var(--purple); transform: scale(1.05);
  box-shadow: 0 4px 18px rgba(120,100,180,0.15);
}

/* Main Content */
.main-content { padding: 0 28px 140px; max-width: 880px; margin: 0 auto; }
.cards-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* Greeting */
.greeting {
  font-size: 22px; font-weight: 350; margin: 10px 0 4px;
  color: var(--text); text-align: right;
  animation: greetIn 1.2s cubic-bezier(0.22, 0.61, 0.36, 1);
}
.greeting-sub {
  font-size: 15px; color: var(--muted); margin-bottom: 14px;
  text-align: right;
  animation: greetIn 1.2s 0.3s cubic-bezier(0.22, 0.61, 0.36, 1) both;
}

/* Day Selector */
.day-selector {
  display: flex; gap: 6px; margin-bottom: 20px;
  background: var(--card); border-radius: var(--radius-sm);
  border: 0.5px solid var(--border); padding: 4px;
}
.day-btn {
  flex: 1; padding: 8px 4px 6px; text-align: center; font-size: 16px;
  font-weight: 500; cursor: pointer; border: none; background: transparent;
  color: var(--muted); border-radius: 10px; font-family: var(--font);
  transition: all 0.2s;
}
.day-btn span { display: block; font-size: 10px; font-weight: 400; color: var(--hint); }
.day-btn:hover { background: var(--purple-light); color: var(--purple); }
.day-btn.active { background: var(--purple); color: #fff; }
.day-btn.active span { color: rgba(255,255,255,0.7); }
.day-btn.today:not(.active) { color: var(--purple); font-weight: 600; }

@keyframes greetIn {
  from { opacity: 0; transform: translateX(40px); }
  to { opacity: 1; transform: translateX(0); }
}

/* Meal Card */
.meal-section { margin-bottom: 22px; }
.meal-section-title {
  font-size: 15px; font-weight: 500; color: var(--muted);
  margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
}
.meal-section-title .member-name { color: var(--text); font-weight: 500; }

.person-card {
  background: var(--card); border-radius: var(--radius);
  border: 0.5px solid var(--border);
  padding: 22px 22px 18px; margin-bottom: 14px;
  box-shadow: var(--shadow);
  transition: all 0.3s ease;
}
.person-card.card-diet {
  background: var(--card-diet-bg);
  border-color: var(--card-diet-border);
  box-shadow: 0 4px 18px var(--card-diet-glow);
}
.person-card.card-normal {
  background: var(--card-normal-bg);
  border-color: var(--card-normal-border);
  box-shadow: 0 4px 18px var(--card-normal-glow);
}
.person-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.06); }
.person-card.card-diet:hover { box-shadow: 0 6px 24px var(--card-diet-glow); }
.person-card.card-normal:hover { box-shadow: 0 6px 24px var(--card-normal-glow); }

.person-card-header {
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 16px;
}
.person-name { font-size: 17px; font-weight: 500; display: flex; align-items: center; gap: 10px; }
.person-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.dot-diet {
  background: linear-gradient(135deg, #6db85d, #8fd47d);
  box-shadow: 0 0 8px rgba(109,184,93,0.3);
}
.dot-normal {
  background: linear-gradient(135deg, #f0a54a, #f7c277);
  box-shadow: 0 0 8px rgba(240,165,74,0.3);
}

.cal-toggle {
  font-size: 14px; color: var(--hint); cursor: pointer;
  padding: 4px 12px; border-radius: 14px; border: 0.5px solid transparent;
  transition: all 0.2s; user-select: none;
}
.cal-toggle:hover { border-color: var(--border); color: var(--purple); }
.cal-toggle.show { color: var(--purple); }

.dish-items { display: flex; flex-direction: column; gap: 10px; }

.dish-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 0.5px solid var(--border);
  cursor: pointer; transition: all 0.2s; justify-content: center;
}
.dish-row:last-child { border-bottom: none; }
.dish-row:hover { background: var(--purple-light); border-radius: 10px; border-bottom-color: transparent; }
.dish-row .dish-cat {
  font-size: 11px; color: var(--hint); min-width: 40px;
  font-weight: 500; letter-spacing: 1px; text-align: center;
}
.dish-row .dish-name { font-size: 16px; font-weight: 450; text-align: center; }
.dish-row .dish-time { font-size: 12px; color: var(--hint); text-align: center; }
.dish-row .dish-cal {
  font-size: 12px; color: var(--purple); min-width: 55px; text-align: center;
  display: none; cursor: pointer;
}
.dish-row .dish-cal.visible { display: block; }

.swap-btn {
  width: 30px; height: 30px; border-radius: 50%; border: 0.5px solid var(--border);
  background: var(--card); cursor: pointer; font-size: 14px; display: flex;
  align-items: center; justify-content: center; color: var(--hint);
  transition: all 0.2s; flex-shrink: 0; opacity: 0;
}
.dish-row:hover .swap-btn { opacity: 1; }
.swap-btn:hover { background: var(--purple-light); color: var(--purple); border-color: var(--purple); }
.lock-btn {
  width: 30px; height: 30px; border-radius: 50%; border: 0.5px solid var(--border);
  background: var(--card); cursor: pointer; font-size: 13px; display: flex;
  align-items: center; justify-content: center; color: var(--hint);
  transition: all 0.2s; flex-shrink: 0; opacity: 0;
}
.dish-row:hover .lock-btn { opacity: 1; }
.lock-btn:hover { background: #faeeda; color: #e8983e; border-color: #e8983e; }
.lock-btn.locked { opacity: 1; background: #faeeda; color: #e8983e; border-color: #e8983e; }

.total-cal {
  text-align: center; font-size: 13px; color: var(--purple); margin-top: 10px;
  display: none; font-weight: 500; cursor: pointer;
}
.total-cal.visible { display: block; }

.eaten-mark {
  margin-top: 14px; font-size: 14px; color: var(--hint);
  display: flex; align-items: center; gap: 8px; cursor: pointer;
  user-select: none; transition: all 0.25s; font-weight: 450;
  justify-content: flex-end;
}
.eaten-mark:hover { color: var(--muted); }
.eaten-mark .check-circle {
  width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--hint);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}
.eaten-mark.eaten .check-circle {
  background: linear-gradient(135deg, #6db85d, #8fd47d);
  border-color: #6db85d; box-shadow: 0 0 12px rgba(109,184,93,0.25);
}
.eaten-mark.eaten { color: var(--lunch-text); }
.eaten-mark .check { opacity: 0; transition: opacity 0.3s; font-size: 13px; color: #fff; }
.eaten-mark.eaten .check { opacity: 1; }

/* Recipe Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(30,20,50,0.25);
  z-index: 100; display: flex; align-items: flex-end; justify-content: center;
  animation: fadeIn 0.2s ease; backdrop-filter: blur(2px);
}
.modal-sheet {
  background: var(--card); border-radius: 24px 24px 0 0;
  width: 100%; max-width: 640px; max-height: 82vh; overflow-y: auto;
  padding: 28px 24px 48px; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.modal-sheet h2 { font-size: 20px; font-weight: 500; margin-bottom: 6px; }
.modal-sheet .modal-meta { font-size: 14px; color: var(--muted); margin-bottom: 18px; }
.modal-sheet .modal-ingredients {
  background: #fafaf8; border-radius: var(--radius-sm); padding: 14px 16px;
  margin-bottom: 18px; font-size: 15px;
}
.modal-sheet .modal-ingredients span {
  display: inline-block; margin-right: 16px; margin-bottom: 4px;
  color: var(--text);
}
.modal-sheet .modal-step {
  font-size: 15px; margin-bottom: 12px; display: flex; gap: 10px; line-height: 1.7;
}
.modal-sheet .modal-step-num {
  font-weight: 500; color: var(--purple); min-width: 24px; flex-shrink: 0;
}
.modal-close {
  position: sticky; top: 0; float: right; width: 36px; height: 36px;
  border-radius: 50%; border: 0.5px solid var(--border); background: var(--card);
  cursor: pointer; font-size: 18px; display: flex; align-items: center;
  justify-content: center; z-index: 5; color: var(--muted);
}
.modal-close:hover { background: var(--purple-light); color: var(--purple); }

/* Shopping Bubble */
.shopping-bubble {
  position: fixed; bottom: 28px; left: 20px; right: 20px; max-width: 640px;
  margin: 0 auto;
  background: linear-gradient(135deg, #ede8fb, #f0ecfe);
  border: 1px solid #c8bdf0;
  border-radius: var(--radius); padding: 16px 20px;
  display: none; align-items: center; gap: 14px;
  z-index: 20; animation: slideUpBubble 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  cursor: pointer; box-shadow: 0 4px 24px rgba(120,100,200,0.15);
}
.shopping-bubble .bubble-icon {
  width: 46px; height: 46px; border-radius: 50%;
  background: linear-gradient(135deg, #7c6fcf, #9b8fde);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0; color: #fff;
}
.shopping-bubble .bubble-text { flex: 1; }
.shopping-bubble .bubble-title { font-size: 15px; font-weight: 500; color: #483f80; }
.shopping-bubble .bubble-sub { font-size: 13px; color: #7c6fcf; margin-top: 2px; }

/* Settings Panel */
.settings-overlay {
  position: fixed; inset: 0; background: rgba(30,20,50,0.25); z-index: 200;
  display: none; align-items: flex-end; justify-content: flex-end;
  backdrop-filter: blur(2px);
}
.settings-panel {
  background: var(--card); width: auto; min-width: 320px; max-width: 380px;
  border-radius: 24px 24px 0 0; padding: 28px 24px 40px;
  overflow-y: auto; max-height: 85vh;
  animation: settingsUp 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
  transform-origin: bottom right;
}
@keyframes settingsUp {
  from { transform: translateY(60px) scale(0.92); opacity: 0; }
  to { transform: translateY(0) scale(1); opacity: 1; }
}
.settings-panel h2 { font-size: 22px; font-weight: 500; margin-bottom: 26px; letter-spacing: 0.5px; }
/* Settings Tabs */
.settings-tabs { display: flex; gap: 4px; margin-bottom: 22px; background: var(--bg); border-radius: 12px; padding: 4px; }
.settings-tab {
  flex: 1; padding: 10px 6px; text-align: center; font-size: 14px; font-weight: 500;
  cursor: pointer; border-radius: 10px; border: none; background: transparent;
  color: var(--muted); font-family: var(--font); transition: all 0.25s;
}
.settings-tab.active { background: var(--card); color: var(--purple); box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
.settings-tab-content { display: none; animation: greetIn 0.35s cubic-bezier(0.22, 0.61, 0.36, 1); }
.settings-tab-content.active { display: block; }
.settings-sub-content { display: none; animation: greetIn 0.35s cubic-bezier(0.22, 0.61, 0.36, 1); }
.settings-sub-content.active { display: block; }
.settings-group { margin-bottom: 26px; }
.settings-group h3 { font-size: 16px; font-weight: 500; color: var(--purple); margin-bottom: 12px; }
.settings-group .arrow { display: none; }
.settings-group .group-content { max-height: none; overflow: visible; opacity: 1; }
.settings-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0; border-bottom: 0.5px solid var(--border);
}
.settings-row label { font-size: 16px; font-weight: 450; }
.settings-row input[type="time"] {
  padding: 8px 8px; border: 0.5px solid var(--border); border-radius: 8px;
  font-size: 15px; font-family: var(--font); width: auto;
}
.settings-row input[type="time"]::-webkit-calendar-picker-indicator {
  opacity: 0; position: absolute; right: 0; width: 100%; height: 100%; cursor: pointer;
}
.settings-row input[type="time"] { position: relative; }
.settings-row input[type="text"], .settings-row input[type="number"] {
  padding: 8px 12px; border: 0.5px solid var(--border); border-radius: 8px;
  font-size: 15px; font-family: var(--font); width: 100px;
}
.settings-row input:focus { border-color: var(--purple); outline: none; }
.settings-row select {
  padding: 8px 12px; border: 0.5px solid var(--border); border-radius: 8px;
  font-size: 15px; font-family: var(--font);
}
.toggle-switch {
  width: 50px; height: 30px; border-radius: 15px; background: var(--border);
  cursor: pointer; position: relative; transition: background 0.3s;
}
.toggle-switch.on { background: var(--purple); }
.toggle-switch::after {
  content: ''; position: absolute; top: 3px; left: 3px;
  width: 24px; height: 24px; border-radius: 50%; background: #fff;
  transition: transform 0.3s;
}
.toggle-switch.on::after { transform: translateX(20px); }
.settings-buttons { display: flex; gap: 10px; margin-top: 20px; }
.settings-close {
  flex: 1; padding: 14px; border-radius: var(--radius-sm);
  border: 0.5px solid var(--border); background: var(--card);
  font-size: 16px; cursor: pointer; font-family: var(--font);
}
.settings-save {
  flex: 1; padding: 14px; border-radius: var(--radius-sm);
  border: none; background: linear-gradient(135deg, #7c6fcf, #9b8fde);
  color: #fff; font-size: 16px; cursor: pointer; font-family: var(--font);
  font-weight: 500;
}
.settings-save:hover { opacity: 0.9; }

/* Weekend Summary */
.weekend-summary {
  background: linear-gradient(135deg, #fafaf8, #f6f4f0);
  border-radius: var(--radius); border: 0.5px solid var(--border);
  padding: 20px 22px; margin-bottom: 18px;
}
.weekend-summary h3 { font-size: 16px; font-weight: 500; margin-bottom: 8px; color: var(--purple-text); }
.weekend-summary .stats-row { display: flex; gap: 28px; margin-top: 8px; }
.weekend-summary .stat-item { text-align: center; }
.weekend-summary .stat-val { font-size: 28px; font-weight: 280; color: var(--purple); }
.weekend-summary .stat-label { font-size: 12px; color: var(--muted); }
.weekend-summary .summary-msg { font-size: 15px; color: var(--muted); margin-top: 10px; line-height: 1.6; }

/* Shopping List */
.shopping-list-content { padding: 8px 0; }
.shopping-list-content h3 { font-size: 16px; font-weight: 500; margin-bottom: 14px; }
.shopping-category { margin-bottom: 16px; }
.shopping-category h4 { font-size: 13px; font-weight: 500; color: var(--purple); margin-bottom: 6px; }
.shopping-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; font-size: 15px; border-bottom: 0.5px dotted var(--border);
}
.shop-check {
  width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--hint);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: #fff; flex-shrink: 0;
  transition: all 0.25s;
}
.shop-check.done { background: var(--lunch-accent); border-color: var(--lunch-accent); }
.shopping-total { font-size: 15px; text-align: right; padding: 10px 0; color: var(--muted); }

/* Animations */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes slideUpBubble { from { transform: translateY(80px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes slideRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.015); } }

.person-card { animation: fadeIn 0.5s ease; }
.person-card:nth-child(2) { animation-delay: 0.12s; }
.shopping-bubble { animation: pulse 2.4s ease-in-out infinite; }

/* All-Day Preview */
.all-day-fab {
  position: fixed; bottom: 28px; right: 88px; z-index: 15;
  width: 48px; height: 48px; border-radius: 50%;
  border: 0.5px solid var(--border); background: var(--card);

.week-fab, .ing-fab {

/* Week Grid */
.week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
.week-day {

<script>
// Debug helper
function debug(msg, obj) {
  console.log('[饮食助手]', msg, obj || '');
}

// ============================================================
// 云同步：GitHub Gist（按 gist-cloud-sync skill 标准实现）
// ============================================================
let _syncPending = false;
let _syncQueued = false;
let _lastPushTime = 0;

function getSyncInfo() {
  return {
    token: syncGet('github_token', ''),
    gistId: syncGet('github_gist_id', '')
  };
}

function saveSyncInfo(token, gistId) {
  localStorage.setItem('github_token', JSON.stringify(token));
  localStorage.setItem('github_gist_id', JSON.stringify(gistId));
}

function syncGet(key, fallback) {
  try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : fallback; }
  catch(e) { return fallback; }
}

async function syncToGist() {
  const { token, gistId } = getSyncInfo();
  if (!token || !gistId) return false;
  if (!navigator.onLine) return false;
  if (_syncPending) { _syncQueued = true; return false; }
  _syncPending = true; _syncQueued = false;

  const allData = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k.startsWith('diet_helper') || k.startsWith('shop_')) {
      allData[k] = localStorage.getItem(k);
    }
  }

  try {
    const res = await fetch(`https://api.github.com/gists/${gistId}`, {
      method: 'PATCH',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github+json'
      },
      body: JSON.stringify({
        files: { 'diet-data.json': { content: JSON.stringify(allData) } }
      })
    });
    if (!res.ok) { _syncPending = false; _syncQueued = false; return false; }
    _lastPushTime = Date.now();
    _syncPending = false;
    if (_syncQueued) { _syncQueued = false; syncToGist(); }
    return true;
  } catch(e) { _syncPending = false; _syncQueued = false; return false; }
}

async function syncFromGist() {
  const { token, gistId } = getSyncInfo();
  if (!token || !gistId) return false;
  try {
    const r = await fetch(`https://api.github.com/gists/${gistId}`, {
      headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' }
    });
    if (!r.ok) return false;
    const gist = await r.json();
    const file = gist.files && gist.files['diet-data.json'];
    if (!file || !file.content) return false;
    const gistTime = new Date(gist.updated_at).getTime();
    if (_lastPushTime && gistTime <= _lastPushTime) return false;
    const allData = JSON.parse(file.content);
    const saveTok = syncGet('github_token', '');
    const saveGist = syncGet('github_gist_id', '');
    Object.keys(allData).forEach(k => localStorage.setItem(k, allData[k]));
    if (saveTok) localStorage.setItem('github_token', JSON.stringify(saveTok));
    if (saveGist) localStorage.setItem('github_gist_id', JSON.stringify(saveGist));
    _lastPushTime = Math.max(_lastPushTime, gistTime);
    return true;
  } catch(e) { return false; }
}

let _syncDebounce = null;
function autoSync() {
  if (!getSyncInfo().token) return;
  clearTimeout(_syncDebounce);
  _syncDebounce = setTimeout(() => syncToGist(), 500);
}

// Override Storage.setItem to auto-sync diet/shop keys
const _origSetItem = Storage.prototype.setItem;
const _origRemoveItem = Storage.prototype.removeItem;
Storage.prototype.setItem = function(key, value) {
  _origSetItem.call(this, key, value);
  if (key.startsWith('diet_helper') || key.startsWith('shop_')) autoSync();
};
Storage.prototype.removeItem = function(key) {
  _origRemoveItem.call(this, key);
  if (key.startsWith('diet_helper') || key.startsWith('shop_')) autoSync();
};

// Poll + focus + online events
setInterval(() => { if (getSyncInfo().token && navigator.onLine) syncFromGist(); }, 60000);
window.addEventListener('focus', () => { if (getSyncInfo().token && navigator.onLine) syncFromGist(); });
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && getSyncInfo().token && navigator.onLine) syncFromGist();
});
window.addEventListener('online', () => { if (getSyncInfo().token) { syncFromGist(); syncToGist(); } });

// ============================================================
// 数据加载
// ============================================================
let DISHES = {};
let RULES = {};
let INGREDIENTS = {};
let selectedDate = new Date().toISOString().slice(0,10);

async function init() {
  debug('开始初始化...');
  try {
    const [d, r, i] = await Promise.all([
      fetch('data/dishes.json').then(r => r.json()),
      fetch('data/rules.json').then(r => r.json()),
      fetch('data/ingredients.json').then(r => r.json())
    ]);
    DISHES = d; RULES = r; INGREDIENTS = i;
    debug('数据加载完成（fetch）');
  } catch(e) {
    debug('fetch失败，使用嵌入数据...', e.message);
    try {
      DISHES = JSON.parse(document.getElementById('embedded-dishes').textContent);
      RULES = JSON.parse(document.getElementById('embedded-rules').textContent);
      INGREDIENTS = JSON.parse(document.getElementById('embedded-ingredients').textContent);
      debug('嵌入数据加载完成');
    } catch(e2) {
      debug('数据加载失败', e2);
      document.getElementById('periodTag').textContent = '数据加载失败';
      return;
    }
  }

  loadSettings();
  debug('设置加载完成', settings);

  // Clean old localStorage data (version 3 = time picker fixes)
  const STORAGE_VERSION = '4';

  generateIfNeeded(STORAGE_VERSION);
  startClock();
  // Pull cloud data on startup (if configured)
  if (getSyncInfo().token) { setTimeout(() => { syncFromGist().then(() => renderAll()); }, 300); }
  renderAll();

  const period = getCurrentPeriod();
  debug('当前时段', period);

  setInterval(() => { startClock(); }, 1000);
  setInterval(() => {
    const newPeriod = getCurrentPeriod();
    if (newPeriod !== getCurrentPeriod()) {
      debug('时段切换', newPeriod);
    }
    renderAll();
  }, 60000);
}

// ============================================================
// 时间管理
// ============================================================
function getTimeWindows() {
  return {
    breakfast: { start: settings.twBreakfastStart || '06:00', end: settings.twBreakfastEnd || '10:30' },
    lunch: { start: settings.twLunchStart || '10:30', end: settings.twLunchEnd || '15:00' },
    dinner: { start: settings.twDinnerStart || '15:00', end: settings.twDinnerEnd || '20:00' },
  };
}

function getCurrentPeriod() {
  const now = new Date();
  const hm = now.getHours() * 60 + now.getMinutes();
  const tw = getTimeWindows();

  function toMin(s) { const [h,m] = s.split(':').map(Number); return h*60+m; }

  if (hm >= toMin(tw.breakfast.start) && hm < toMin(tw.breakfast.end)) return 'breakfast';
  if (hm >= toMin(tw.lunch.start) && hm < toMin(tw.lunch.end)) return 'lunch';
  if (hm >= toMin(tw.dinner.start) && hm < toMin(tw.dinner.end)) return 'dinner';
  return 'fasting';
}

function startClock() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  const s = now.getSeconds().toString().padStart(2,'0');
  document.getElementById('currentTime').textContent = `${h}:${m}:${s}`;
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('currentDate').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${days[now.getDay()]}`;
}

// ============================================================
// 菜单生成
// ============================================================
function getStorageKey() {
  const now = new Date();
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((now.getDay() + 6) % 7));
  return 'diet_helper_week_' + monday.toISOString().slice(0,10);
}

function generateIfNeeded(version) {
  const key = getStorageKey();
  let weekData;
  try {
    weekData = JSON.parse(localStorage.getItem(key));
  } catch(e) { weekData = null; }

  if (!weekData || !weekData.days || Object.keys(weekData.days).length === 0 || weekData.version !== version) {
    debug('清除旧数据，版本不匹配', { old: weekData?.version, new: version });
    localStorage.removeItem(key);
    weekData = { days: {}, eaten: {}, version: version, generated: new Date().toISOString() };
  }

  const today = new Date().toISOString().slice(0,10);
  debug('检查今日菜单', { today, hasData: !!weekData.days[today] });

  if (!weekData.days[today]) {
    debug('生成整周菜单...');
    const members = [
      { name: settings.member1Name, type: settings.member1Type, id: 'm1' },
      { name: settings.member2Name, type: settings.member2Type, id: 'm2' }
    ];

    // Generate all 7 days of the week
    const now = new Date();
    const monday = new Date(now);
    monday.setDate(now.getDate() - ((now.getDay() + 6) % 7));

    for (let d = 0; d < 7; d++) {
      const date = new Date(monday);
      date.setDate(monday.getDate() + d);
      const dateStr = date.toISOString().slice(0,10);

      if (weekData.days[dateStr]) continue; // Skip already generated

      const dayMeals = {};
      for (const m of members) {
        dayMeals[m.id] = {};
        for (const meal of ['早餐','午餐','晚餐']) {
          dayMeals[m.id][meal] = generateCombo(m.type, meal, weekData, m.id);
        }
      }
      weekData.days[dateStr] = dayMeals;
    }
    localStorage.setItem(key, JSON.stringify(weekData));
    debug('整周菜单已生成');
  }
  return weekData;
}

function generateCombo(type, meal, weekData, memberId) {
  const rule = RULES[type]?.[meal];
  if (!rule) return [];

  // Use custom calorie range from settings if available
  let minCal, maxCal;
  const customKey = `calRange_${type === '减脂' ? 'diet' : 'normal'}_${meal === '早餐' ? 'breakfast' : meal === '午餐' ? 'lunch' : 'dinner'}`;
  const custom = settings[customKey];
  if (custom && custom.includes('-')) {
    [minCal, maxCal] = custom.split('-').map(Number);
  } else {
    [minCal, maxCal] = rule.targetCal;
  }

  const usedNames = new Set();
  if (weekData && weekData.days) {
    for (const [date, dayData] of Object.entries(weekData.days)) {
      if (!dayData[memberId] || !dayData[memberId][meal]) continue;
      for (const d of dayData[memberId][meal]) usedNames.add(d.name);
    }
  }

  let bestCombo = null;
  let bestDiff = Infinity;

  for (let attempt = 0; attempt < 50; attempt++) {
    const combo = [];
    const pickUsed = new Set(usedNames);

    // Pick from required categories
    for (const cat of rule.categories) {
      if (!cat.required) continue;
      const key = `${type}_${meal}_${cat.category}`;
      const pool = (DISHES[key] || []).filter(d => type !== '减脂' || !pickUsed.has(d.name));
      if (pool.length === 0) continue;
      const pick = pool[Math.floor(Math.random() * pool.length)];
      combo.push({ ...pick, category: cat.category });
      if (type === '减脂') pickUsed.add(pick.name);
    }

    // Optionally add non-required
    for (const cat of rule.categories) {
      if (cat.required) continue;
      if (Math.random() > 0.5) {
        const key = `${type}_${meal}_${cat.category}`;
        const pool = (DISHES[key] || []).filter(d => type !== '减脂' || !pickUsed.has(d.name));
        if (pool.length === 0) continue;
        const pick = pool[Math.floor(Math.random() * pool.length)];
        combo.push({ ...pick, category: cat.category });
        if (type === '减脂') pickUsed.add(pick.name);
      }
    }

    const totalCal = combo.reduce((s, d) => s + (d.calories || 0), 0);
    if (totalCal >= minCal && totalCal <= maxCal) return combo;

    const diff = Math.min(Math.abs(totalCal - minCal), Math.abs(totalCal - maxCal));
    if (diff < bestDiff) { bestDiff = diff; bestCombo = combo; }
  }

  return bestCombo || [];
}

function getTodayMeals() {
  const key = getStorageKey();
  let weekData;
  try { weekData = JSON.parse(localStorage.getItem(key)); } catch(e) { return null; }
  if (!weekData || !weekData.days) return null;
  return weekData.days[selectedDate] || null;
}

function swapDish(memberId, meal, dishIndex) {
  if (isLocked(memberId, meal, dishIndex)) return; // Locked dishes can't be swapped
  const key = getStorageKey();
  const weekData = JSON.parse(localStorage.getItem(key));
  const dayMeals = weekData.days[selectedDate];
  if (!dayMeals || !dayMeals[memberId] || !dayMeals[memberId][meal]) return;

  const oldDish = dayMeals[memberId][meal][dishIndex];
  const member = memberId === 'm1'
    ? { type: settings.member1Type }
    : { type: settings.member2Type };

  const key2 = `${member.type}_${meal}_${oldDish.category}`;
  const pool = (DISHES[key2] || []).filter(d => d.id !== oldDish.id);
  if (pool.length === 0) return;

  const usedNames = new Set();
  for (const [date, dd] of Object.entries(weekData.days)) {
    if (!dd[memberId] || !dd[memberId][meal]) continue;
    for (const d of dd[memberId][meal]) usedNames.add(d.name);
  }

  const available = pool.filter(d => !usedNames.has(d.name));
  const pickPool = available.length > 0 ? available : pool;
  const pick = pickPool[Math.floor(Math.random() * pickPool.length)];

  dayMeals[memberId][meal][dishIndex] = { ...pick, category: oldDish.category };
  localStorage.setItem(key, JSON.stringify(weekData));
  renderAll();
}

// ===== Lock =====
function getLockKey() { return 'diet_helper_locked'; }

function isLocked(memberId, meal, dishIndex) {
  try {
    const data = JSON.parse(localStorage.getItem(getLockKey())) || {};
    const today = new Date().toISOString().slice(0,10);
    return data[`${memberId}_${today}_${meal}_${dishIndex}`] || false;
  } catch(e) { return false; }
}

function toggleLock(memberId, meal, dishIndex) {
  const lockKey = getLockKey();
  const data = JSON.parse(localStorage.getItem(lockKey)) || {};
  const today = new Date().toISOString().slice(0,10);
  const k = `${memberId}_${today}_${meal}_${dishIndex}`;
  data[k] = !data[k];
  localStorage.setItem(lockKey, JSON.stringify(data));
  renderAll();
}

function toggleEaten(memberId, meal) {
  const key = getStorageKey();
  const weekData = JSON.parse(localStorage.getItem(key));
  if (!weekData.eaten) weekData.eaten = {};
  const ek = `${memberId}_${new Date().toISOString().slice(0,10)}_${meal}`;
  weekData.eaten[ek] = !weekData.eaten[ek];
  localStorage.setItem(key, JSON.stringify(weekData));
  renderAll();
}

function isEaten(memberId, meal) {
  const key = getStorageKey();
  let weekData;
  try { weekData = JSON.parse(localStorage.getItem(key)); } catch(e) { return false; }
  if (!weekData || !weekData.eaten) return false;
  const ek = `${memberId}_${new Date().toISOString().slice(0,10)}_${meal}`;
  return !!weekData.eaten[ek];
}

function renderAll() {
  const period = getCurrentPeriod();
  const body = document.body;
  body.className = 'period-' + period;

  const periodNames = { breakfast: '早餐时段', lunch: '午餐时段', dinner: '晚餐时段', fasting: '晚安啦，追逐健康的人！' };

  document.getElementById('periodTag').textContent = periodNames[period];

  const content = document.getElementById('mainContent');

  if (period === 'fasting') {
    const tw = getTimeWindows();
    content.innerHTML = `
      <div class="fasting-screen">
        <span class="moon">&#x1F319;</span>
        <h2>身体正在休息，明天见~</h2>
        <p>明早 ${tw.breakfast.start} 解锁早餐</p>
      </div>`;
    document.getElementById('shoppingBubble').style.display = 'none';
    document.getElementById('allDayBtn').style.display = 'none';
    document.getElementById('ingSearchBubble').style.display = 'none';
    return;
  }
  document.getElementById('ingSearchBubble').style.display = 'flex';

  const todayMeals = getTodayMeals();
  if (!todayMeals) {
    debug('今日菜单缺失，重新生成...');
    const version = localStorage.getItem(getStorageKey() + '_v') || '3';
    const newData = generateIfNeeded(version);
    if (!newData || !newData.days) {
      content.innerHTML = '<div class="fasting-screen"><p>菜单生成失败，请刷新页面</p></div>';
      return;
    }
    // Retry
    const retry = getTodayMeals();
    if (!retry) {
      content.innerHTML = '<div class="fasting-screen"><p>菜单加载失败，请刷新页面</p></div>';
      return;
    }
    renderMealsContent(content, period, retry);
    return;
  }

  renderMealsContent(content, period, todayMeals);
}

function renderMealsContent(content, period, todayMeals) {
  const currentMeal = period === 'breakfast' ? '早餐' : period === 'lunch' ? '午餐' : '晚餐';

  // Greeting
  const hour = new Date().getHours();
  let greeting = '早上好';
  if (hour >= 12 && hour < 18) greeting = '下午好';
  else if (hour >= 18) greeting = '晚上好';
  else if (hour >= 6 && hour < 12) greeting = '早上好';

  // Weekend summary
  const now = new Date();
  const isWeekend = now.getDay() === 0 || now.getDay() === 6;
  let summaryHTML = '';
  if (isWeekend) {
    const key = getStorageKey();
    let weekData;
    try { weekData = JSON.parse(localStorage.getItem(key)); } catch(e) { weekData = null; }
    const eaten = weekData?.eaten || {};
    let totalMeals = 0, eatenMeals = 0;
    for (const [k, v] of Object.entries(eaten)) {
      if (v) eatenMeals++;
      totalMeals++;
    }
    const pct = totalMeals > 0 ? Math.round(eatenMeals / Math.max(totalMeals, 1) * 100) : 0;
    const msgs = [
      '每一餐认真吃，就是对自己最好的温柔。',
      '不管坚持了几天，愿意开始就很了不起了。',
      '好好吃饭这件事，你做得比想象中好。',
      '这一周辛苦了，周末奖励自己一顿好的吧~'
    ];
    summaryHTML = `
      <div class="weekend-summary">
        <h3>周末小总结</h3>
        <div class="stats-row">
          <div class="stat-item"><div class="stat-val">${eatenMeals}</div><div class="stat-label">餐已标记</div></div>
          <div class="stat-item"><div class="stat-val">${pct}%</div><div class="stat-label">坚持率</div></div>
        </div>
        <div class="summary-msg">${msgs[Math.floor(Math.random()*msgs.length)]}</div>
      </div>`;
  }

  let html = summaryHTML;
  html += `<div class="greeting">${greeting}</div>`;
  html += `<div class="greeting-sub">今天吃什么？饮食助手帮你安排好了~</div>`;

  // Members
  const members = [
    { name: settings.member1Name, type: settings.member1Type, id: 'm1', dotClass: 'dot-diet' },
    { name: settings.member2Name, type: settings.member2Type, id: 'm2', dotClass: 'dot-normal' }
  ];

  html += `<div class="meal-section">
    <div class="cards-row">`;

  for (const member of members) {
    const meals = todayMeals[member.id]?.[currentMeal] || [];

    // Weekend cheat meal: Saturday/Sunday lunch
    const isWeekendLunch = (now.getDay() === 6 || now.getDay() === 0) && currentMeal === '午餐';
    if (isWeekendLunch) {
      html += `
      <div class="person-card${member.type === '减脂' ? ' card-diet' : ' card-normal'}" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:180px;gap:10px;">
        <div style="font-size:32px;">&#x1F35D;</div>
        <div style="font-size:16px;font-weight:500;">外出就餐</div>
        <div style="font-size:13px;color:var(--muted);text-align:center;line-height:1.5;">今天不安排<br>带${member.name === '我' ? '女友' : (member.name + '自己')}出去吃顿好的吧</div>
        <div style="font-size:12px;color:var(--purple);margin-top:4px;">这周坚持得很棒 &#x1F31F;</div>
      </div>`;
      continue;
    }

    html += `
      <div class="person-card${member.type === '减脂' ? ' card-diet' : ' card-normal'}">
        <div class="person-card-header">
          <div class="person-name">
            <span class="person-dot ${member.dotClass}"></span>
            ${member.name} · <span style="font-size:13px;color:var(--hint);font-weight:400;">${member.type === '减脂' ? '减脂' : '营养'}</span>
          </div>
          <span class="cal-toggle${settings.showCalories ? ' show' : ''}" 
                onclick="toggleCalDisplay(event)" 
                title="点击切换热量显示">
            ${settings.showCalories ? '' : '···'}
          </span>
        </div>
        <div class="dish-items">`;

    const totalCal = meals.reduce((s, d) => s + (d.calories || 0), 0);

    for (let i = 0; i < meals.length; i++) {
      const dish = meals[i];
      html += `
        <div class="dish-row" onclick="openRecipe('${dish.id}')">
          <span class="dish-cat">${dish.category}</span>
          <span class="dish-name">${dish.name}</span>
          <span class="dish-time">${dish.cookingTime}</span>
          <span class="dish-cal${settings.showCalories ? ' visible' : ''}" onclick="event.stopPropagation();toggleCalDisplay(event)">${dish.calories} kcal</span>
          <button class="lock-btn${isLocked(member.id, currentMeal, i) ? ' locked' : ''}" onclick="event.stopPropagation();toggleLock('${member.id}','${currentMeal}',${i})" title="锁定/解锁">&#x1F512;</button>
          <button class="swap-btn" onclick="event.stopPropagation();swapDish('${member.id}','${currentMeal}',${i})" title="换一道">&#x21C4;</button>
        </div>`;
    }

    html += `</div>
        <div class="total-cal${settings.showCalories ? ' visible' : ''}" onclick="toggleCalDisplay(event)">合计 ${totalCal} kcal</div>
        <div class="eaten-mark${isEaten(member.id, currentMeal) ? ' eaten' : ''}" 
             onclick="toggleEaten('${member.id}','${currentMeal}')">
          <span class="check-circle"><span class="check">&#x2713;</span></span>
          已吃
        </div>
      </div>`;
  }

  html += `</div></div>`;

  content.innerHTML = html;

  // Floating all-day button
  const previewBtn = document.getElementById('allDayBtn');
  if (previewBtn) previewBtn.style.display = 'flex';

  // Shopping bubble
  const isFriday = now.getDay() === 5;
  const isAfter6pm = now.getHours() >= 18;
  const thisWeek = getStorageKey();
  if (isFriday && isAfter6pm && settings.lastShoppingWeek !== thisWeek) {
    document.getElementById('shoppingBubble').style.display = 'flex';
  } else if (settings.shoppingConfirmed) {
    document.getElementById('shoppingBubble').style.display = 'none';
  }
}

function findDishById(id) {
  for (const key of Object.keys(DISHES)) {
    const found = DISHES[key].find(d => d.id === id);
    if (found) return found;
  }
  return null;
}

function openRecipe(dishId) {
  const dish = findDishById(dishId);
  if (!dish) return;

  const modal = document.getElementById('recipeModal');
  const content = document.getElementById('recipeModalContent');

  let html = `<button class="modal-close" onclick="closeRecipeModal()">&times;</button>`;
  html += `<h2>${dish.name}</h2>`;
  html += `<div class="modal-meta">${dish.calories} kcal · ${dish.cookingTime} · ${dish.difficulty || ''}</div>`;

  if (dish.ingredients && dish.ingredients.length > 0) {
    html += `<div class="modal-ingredients">`;
    html += dish.ingredients.map(i => {
      const ingName = i.name;
      const hasIngredient = INGREDIENTS[ingName];
      if (hasIngredient) {
        return `<span style="cursor:pointer;color:var(--lunch-accent);border-bottom:1px dashed var(--lunch-accent);" 
                onclick="event.stopPropagation();openIngredient('${ingName}')">${ingName}</span> ${i.amount}`;
      }
      return `<span>${ingName} ${i.amount}</span>`;
    }).join('');
    html += `</div>`;
  }

  if (dish.steps && dish.steps.length > 0) {
    dish.steps.forEach((step, idx) => {
      html += `<div class="modal-step"><span class="modal-step-num">${idx + 1}.</span><span>${step}</span></div>`;
    });
  }

  if (dish.tags && dish.tags.length > 0) {
    html += `<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;">`;
    dish.tags.forEach(t => {
      html += `<span style="font-size:11px;padding:2px 8px;border-radius:10px;background:#eaf3de;color:#639922;">${t}</span>`;
    });
    html += `</div>`;
  }

  content.innerHTML = html;
  modal.style.display = 'flex';
  document.getElementById('ingSearchBubble').style.display = 'none';
  document.body.style.overflow = 'hidden';
}

function closeRecipeModal(e) {
  if (e && e.target !== document.getElementById('recipeModal')) return;
  qClose('recipeModal', () => document.getElementById('ingSearchBubble').style.display = 'flex');
}

function openIngredient(name) {
  const data = INGREDIENTS[name];
  if (!data) return;
  const content = document.getElementById('recipeModalContent');
  let html = `<button class="modal-close" onclick="closeRecipeModal()">&times;</button>`;
  html += `<h2>${name}</h2>`;
  html += `<div class="modal-meta">${data.category || ''} · ${data.calories || ''}</div>`;
  if (data.storage) html += `<div class="modal-ingredients"><strong>保存方法</strong><br>${data.storage}</div>`;
  if (data.tips) html += `<div class="modal-ingredients"><strong>选购与使用技巧</strong><br>${data.tips}</div>`;
  if (data.dishes && data.dishes.length > 0 && data.dishes[0] !== '几乎所有菜都会用到') {
    html += `<div style="margin-top:10px;font-size:13px;color:var(--muted);">关联菜品：${data.dishes.join('、')}</div>`;
  }
  content.innerHTML = html;
  document.getElementById('recipeModal').style.display = 'flex';
  document.getElementById('ingSearchBubble').style.display = 'none';
}

function openShoppingList() {
  closeFabMenu();
  const key = getStorageKey();
  let weekData;
  try { weekData = JSON.parse(localStorage.getItem(key)); } catch(e) { return; }
  if (!weekData || !weekData.days) return;

  // Collect all ingredients with amount summing
  function parseAmount(s) {
    if (!s) return { value: null, unit: '', raw: '' };
    s = String(s).trim();
    // Numeric: "150g", "1个", "2瓣", "3茶匙", "0.5勺", "10ml"
    let m = s.match(/^([\d.]+)\s*([a-zA-Z\u4e00-\u9fff]+)$/);
    if (m) return { value: parseFloat(m[1]), unit: m[2], raw: s };
    // Chinese fraction: "半勺", "半个"
    m = s.match(/^半\s*(.+)$/);
    if (m) return { value: 0.5, unit: m[1], raw: s };
    // "几片", "几个" → count as 1
    m = s.match(/^几\s*(.+)$/);
    if (m) return { value: 1, unit: m[1], raw: s };
    // "1-2瓣" → take the higher end
    m = s.match(/^(\d+)-(\d+)\s*(.+)$/);
    if (m) return { value: parseFloat(m[2]), unit: m[3], raw: s };
    // "少许", "适量", "若干" → non-numeric
    return { value: null, unit: '', raw: s };
  }

  function formatAmounts(parsed) {
    const groups = {};
    const textOnly = [];
    for (const p of parsed) {
      if (p.value !== null && p.unit) {
        if (!groups[p.unit]) groups[p.unit] = 0;
        groups[p.unit] += p.value;
      } else if (p.raw) {
        textOnly.push(p.raw);
      }
    }
    // Clean up: remove duplicate non-numeric
    const uniqueText = [...new Set(textOnly)];
    const parts = [];
    for (const [unit, val] of Object.entries(groups)) {
      const v = val % 1 === 0 ? val : parseFloat(val.toFixed(1));
      parts.push(v + unit);
    }
    return parts.concat(uniqueText).join(' + ') || uniqueText.join(' + ');
  }

  const allIngredients = {};
  for (const [date, dayData] of Object.entries(weekData.days)) {
    for (const memberId of ['m1', 'm2']) {
      for (const meal of ['早餐', '午餐', '晚餐']) {
        const dishes = dayData[memberId]?.[meal] || [];
        for (const dish of dishes) {
          const fullDish = findDishById(dish.id);
          if (!fullDish || !fullDish.ingredients) continue;
          for (const ing of fullDish.ingredients) {
            const n = ing.name;
            if (!allIngredients[n]) allIngredients[n] = { name: n, amounts: [] };
            allIngredients[n].amounts.push(parseAmount(ing.amount));
          }
        }
      }
    }
  }

  const content = document.getElementById('shopSheet');
  let html = `<button class="modal-close" onclick="closeShopList()">&times;</button>`;
  html += `<h2>本周采购清单</h2>`;
  html += `<div class="modal-meta">${Object.keys(weekData.days).length} 天 · ${Object.keys(allIngredients).length} 种食材</div>`;
  html += `<div class="shopping-list-content">`;

  // Categorize
  const categories = { '肉类':[], '海鲜':[], '蔬菜':[], '蛋奶':[], '主食':[], '调味品':[], '水果':[], '干货':[], '其他':[] };
  for (const [name, info] of Object.entries(allIngredients)) {
    const ingData = INGREDIENTS[name];
    const cat = ingData?.category || '其他';
    let bucket = '其他';
    if (['肉类'].includes(cat)) bucket = '肉类';
    else if (['海鲜'].includes(cat)) bucket = '海鲜';
    else if (['蔬菜'].includes(cat)) bucket = '蔬菜';
    else if (['蛋类','乳制品'].includes(cat)) bucket = '蛋奶';
    else if (['主食','主食替代'].includes(cat)) bucket = '主食';
    else if (['调味品','香料','腌制菜'].includes(cat)) bucket = '调味品';
    else if (['水果','水果/蔬菜'].includes(cat)) bucket = '水果';
    else if (['干货','种子','速冻食品'].includes(cat)) bucket = '干货';
    categories[bucket].push({ name, amounts: info.amounts });
  }

  for (const [cat, items] of Object.entries(categories)) {
    if (items.length === 0) continue;
    html += `<div class="shopping-category"><h4>${cat}</h4>`;
    for (const item of items) {
      const checkKey = `shop_${item.name}`;
      const checked = localStorage.getItem(checkKey) === 'true';
      const amtStr = formatAmounts(item.amounts);
      html += `<div class="shopping-item" onclick="toggleShopItem('${item.name}',this)" style="cursor:pointer;">
        <span class="shop-check${checked ? ' done' : ''}">${checked ? '&#x2713;' : ''}</span>
        <span style="flex:1;${checked ? 'text-decoration:line-through;opacity:0.4;' : ''}">${item.name}</span>
        <span style="color:var(--muted);font-size:13px;">${amtStr}</span>
      </div>`;
    }
    html += `</div>`;
  }

  html += `<div class="shopping-total">共 ${Object.keys(allIngredients).length} 种食材</div>`;
  html += `<button onclick="confirmShopping()" style="width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#7c6fcf,#9b8fde);color:#fff;font-size:15px;cursor:pointer;font-family:var(--font);">确认采购完毕</button>`;
  html += `</div>`;

  content.innerHTML = html;
  const overlay = document.getElementById('shopOverlay');
  overlay.style.display = 'flex';
  document.getElementById('shopSheet').scrollTop = 0;
  document.body.style.overflow = 'hidden';
}

function toggleShopItem(name, el) {
  const key = 'shop_' + name;
  const checked = localStorage.getItem(key) === 'true';
  localStorage.setItem(key, !checked);
  const check = el.querySelector('.shop-check');
  const text = el.querySelector('span:nth-child(2)');
  if (!checked) {
    check.classList.add('done');
    check.innerHTML = '&#x2713;';
    text.style.textDecoration = 'line-through';
    text.style.opacity = '0.4';
  } else {
    check.classList.remove('done');
    check.innerHTML = '';
    text.style.textDecoration = '';
    text.style.opacity = '';
  }
}

function closeShopList() {
  qClose('shopOverlay');
}

function confirmShopping() {
  settings.shoppingConfirmed = true;
  settings.lastShoppingWeek = getStorageKey();
  saveSettings();
  document.getElementById('shoppingBubble').style.display = 'none';
  closeShopList();
}

function switchSettingsTab(tabId, btn) {
  document.querySelectorAll('.settings-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.settings-tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('stab_' + tabId).classList.add('active');
}

function switchSubTab(id, btn) {
  const parent = btn.parentElement;
  parent.querySelectorAll('.settings-tab').forEach(t => t.classList.remove('active'));
  parent.parentElement.querySelectorAll('.settings-sub-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('ssub_' + id).classList.add('active');
}

function row(label, control) {
  return `<div class="settings-row"><label>${label}</label>${control}</div>`;
}

function closeSettings(e) {
  if (e && e.target !== document.getElementById('settingsOverlay')) return;
  qClose('settingsOverlay');
}

// ============================================================
// 设置面板 - 同步
// ============================================================
async function createGistFromSettings() {
  const token = document.getElementById('set_ghToken')?.value.trim();
  if (!token) { alert('请先粘贴 GitHub Token'); return; }
  const status = document.getElementById('syncStatusMsg');
  if (status) status.textContent = '正在创建...';
  try {
    const r = await fetch('https://api.github.com/gists', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github+json' },
      body: JSON.stringify({ description: '饮食助手数据', public: false, files: { 'diet-data.json': { content: '{}' } } })
    });
    if (!r.ok) { const err = await r.text(); if (status) status.textContent = '创建失败：' + err.slice(0,50); return; }
    const gist = await r.json();
    saveSyncInfo(token, gist.id);
    document.getElementById('set_ghGist').value = gist.id;
    if (status) status.textContent = 'Gist 已创建，同步中...';
    await syncToGist();
    if (status) status.textContent = '同步完成！多设备数据已互通';
    saveSettingsFromPanel(); // Also save other settings
  } catch(e) { if (status) status.textContent = '网络错误：' + e.message; }
}

async function testSyncStatus() {
  const { token, gistId } = getSyncInfo();
  const status = document.getElementById('syncStatusMsg');
  if (!token || !gistId) { if (status) status.textContent = '请先配置 Token 和 Gist ID'; return; }
  if (status) status.textContent = '测试中...';
  const ok = await syncToGist();
  if (status) status.textContent = ok ? '同步正常' : '同步失败，检查 Token 和网络';
}

function saveSettingsFromPanel() {
  settings.member1Name = document.getElementById('set_m1name')?.value || settings.member1Name;
  settings.member1Type = document.getElementById('set_m1type')?.value || settings.member1Type;
  settings.member2Name = document.getElementById('set_m2name')?.value || settings.member2Name;
  settings.member2Type = document.getElementById('set_m2type')?.value || settings.member2Type;
  settings.showCalories = document.getElementById('set_calToggle')?.classList.contains('on') || false;

  const bfS = document.getElementById('set_bfStart')?.value;
  const bfE = document.getElementById('set_bfEnd')?.value;
  const lS = document.getElementById('set_lStart')?.value;
  const lE = document.getElementById('set_lEnd')?.value;
  const dS = document.getElementById('set_dStart')?.value;
  const dE = document.getElementById('set_dEnd')?.value;

  if (bfS) settings.twBreakfastStart = bfS;
  if (bfE) settings.twBreakfastEnd = bfE;
  if (lS) settings.twLunchStart = lS;
  if (lE) settings.twLunchEnd = lE;
  if (dS) settings.twDinnerStart = dS;
  if (dE) settings.twDinnerEnd = dE;

  // Calorie ranges
  const calDB = document.getElementById('set_cal_db')?.value;
  const calDL = document.getElementById('set_cal_dl')?.value;
  const calDD = document.getElementById('set_cal_dd')?.value;
  const calNB = document.getElementById('set_cal_nb')?.value;
  const calNL = document.getElementById('set_cal_nl')?.value;
  const calND = document.getElementById('set_cal_nd')?.value;
  if (calDB && calDB.includes('-')) settings.calRange_diet_breakfast = calDB;
  if (calDL && calDL.includes('-')) settings.calRange_diet_lunch = calDL;
  if (calDD && calDD.includes('-')) settings.calRange_diet_dinner = calDD;
  if (calNB && calNB.includes('-')) settings.calRange_normal_breakfast = calNB;
  if (calNL && calNL.includes('-')) settings.calRange_normal_lunch = calNL;
  if (calND && calND.includes('-')) settings.calRange_normal_dinner = calND;

  // Sync: if user manually entered token+gist and clicked save, store them
  const ghTok = document.getElementById('set_ghToken')?.value.trim();
  const ghGist = document.getElementById('set_ghGist')?.value.trim();
  if (ghTok && ghGist) saveSyncInfo(ghTok, ghGist);

  saveSettings();
  closeSettings();
  renderAll();
}

<script id="embedded-dishes" type="application/json">{"减脂_早餐_主食":[{"id":"b_carbs_01","name":"全麦吐司（1片）","category":"主食","mealType":"早餐","type":"减脂","calories":80,"cookingTime":"2分钟","difficulty":"超简单","ingredients":[{"name":"全麦吐司","amount":"1片"}],"steps":["将全麦吐司放入烤面包机烤2分钟（或用平底锅小火干煎，两面各1分钟至微焦）"],"tags":["快手"]},{"id":"b_carbs_02","name":"牛奶燕麦粥","category":"主食","mealType":"早餐","type":"减脂","calories":150,"cookingTime":"5分钟","difficulty":"超简单","ingredients":[{"name":"即食燕麦片","amount":"40g"},{"name":"脱脂牛奶","amount":"250ml"}],"steps":["燕麦片倒入碗中","脱脂牛奶倒入锅中，开中小火加热至微微冒热气（约2分钟，锅边出现小气泡即可，不要沸腾）","将热牛奶倒入燕麦碗中，搅拌，静置2分钟让燕麦充分泡软"],"tags":["快手","高纤维","暖胃"]},{"id":"b_carbs_03","name":"蒸红薯","category":"主食","mealType":"早餐","type":"减脂","calories":120,"cookingTime":"20分钟","difficulty":"超简单","ingredients":[{"name":"红薯","amount":"1个（约150g）"}],"steps":["红薯用刷子刷洗干净（不削皮吃更有营养）","放入蒸锅，大火烧开后转中火蒸20分钟","用筷子能轻松插透就熟了","对半切开更好散热（烫嘴警告！）"],"tags":["粗粮","高纤维","饱腹"]},{"id":"b_carbs_04","name":"紫薯","category":"主食","mealType":"早餐","type":"减脂","calories":120,"cookingTime":"20分钟","difficulty":"超简单","ingredients":[{"name":"紫薯","amount":"1个（约120g）"}],"steps":["紫薯刷洗干净，放入蒸锅，大火烧开后转中火蒸20分钟","筷子能轻松插透就熟了","稍凉后剥皮（不剥皮也可以吃）","可前一晚蒸好放冰箱，早上微波炉加热1分钟"],"tags":["粗粮","高纤维"]},{"id":"b_carbs_05","name":"蒸玉米","category":"主食","mealType":"早餐","type":"减脂","calories":140,"cookingTime":"12分钟","difficulty":"超简单","ingredients":[{"name":"玉米","amount":"1根"}],"steps":["玉米剥去外皮和须（留两层内皮更香）","放入蒸锅，大火烧开后蒸12分钟","水果玉米蒸8分钟即可"],"tags":["粗粮","快手"]},{"id":"b_carbs_06","name":"小米南瓜粥","category":"主食","mealType":"早餐","type":"减脂","calories":170,"cookingTime":"25分钟","difficulty":"简单","ingredients":[{"name":"小米","amount":"40g"},{"name":"南瓜","amount":"100g"},{"name":"水","amount":"600ml"}],"steps":["小米淘洗2遍（不要搓），沥干","南瓜削皮去瓤，切2cm小方块","锅中600ml冷水+南瓜块，大火烧开","水沸后倒入小米，搅一下防粘锅","再次沸腾后转小火，盖盖留条缝煮20分钟","期间搅动2-3次防粘底。南瓜煮烂、米汤浓稠即可"],"tags":["粗粮","暖胃","饱腹"]},{"id":"b_carbs_07","name":"荞麦面","category":"主食","mealType":"早餐","type":"减脂","calories":200,"cookingTime":"8分钟","difficulty":"超简单","ingredients":[{"name":"干荞麦面","amount":"60g"}],"steps":["锅中约800ml水大火烧开","放入荞麦面，用筷子搅散防粘","大火煮3-4分钟，面条变软即可捞出一一荞麦面容易煮烂别过火"],"tags":["低GI","快手"]},{"id":"b_carbs_08","name":"隔夜燕麦杯","category":"主食","mealType":"早餐","type":"减脂","calories":200,"cookingTime":"5分钟（前一晚）","difficulty":"超简单","ingredients":[{"name":"即食燕麦片","amount":"40g"},{"name":"脱脂牛奶","amount":"150ml"},{"name":"无糖酸奶","amount":"50g"},{"name":"奇亚籽","amount":"1茶匙（可选）"}],"steps":["前一晚：倒燕麦入罐 + 牛奶 + 酸奶搅匀","加奇亚籽再搅（加了更浓稠像布丁）","盖盖冷藏过夜（至少4小时）","早上取出直接吃，冬天可微波炉中火1分钟"],"tags":["免开火","提前准备","高纤维"]},{"id":"b_carbs_09","name":"紫薯燕麦碗","category":"主食","mealType":"早餐","type":"减脂","calories":180,"cookingTime":"5分钟","difficulty":"超简单","ingredients":[{"name":"紫薯","amount":"1个"},{"name":"即食燕麦片","amount":"15g"}],"steps":["紫薯提前蒸好（或现蒸20分钟），剥皮用叉子压成泥","燕麦片用少量热水泡2分钟变软","碗中：紫薯泥铺底 -> 泡软的燕麦铺上 -> 倒无糖酸奶","紫薯天然甜味，不用加糖"],"tags":["粗粮","高纤维"]},{"id":"b_carbs_10","name":"全麦吐司（2片）","category":"主食","mealType":"早餐","type":"减脂","calories":160,"cookingTime":"2分钟","difficulty":"超简单","ingredients":[{"name":"全麦吐司","amount":"2片"}],"steps":["全麦吐司放入烤面包机烤2分钟（或平底锅小火每面干煎1分钟至微焦）"],"tags":["快手","便携"]},{"id":"b_carbs_11","name":"蒸素饺子","category":"主食","mealType":"早餐","type":"减脂","calories":280,"cookingTime":"12分钟","difficulty":"超简单","ingredients":[{"name":"速冻素饺子（韭菜鸡蛋馅）","amount":"8-10个"}],"steps":["蒸锅水开，蒸屉铺纸","冷冻饺子不用解冻，直接摆入，留间距","大火蒸8-10分钟，皮变透明馅冒热气即熟","蘸醋吃"],"tags":["中式","快手","家的味道"]}],"减脂_早餐_蛋白":[{"id":"b_protein_01","name":"水煮蛋（1个）","category":"蛋白","mealType":"早餐","type":"减脂","calories":70,"cookingTime":"12分钟","difficulty":"超简单","ingredients":[{"name":"鸡蛋","amount":"1个"}],"steps":["鸡蛋冷水下锅，水没过鸡蛋约2cm","大火烧至沸腾（约3-4分钟），转中火","盖盖煮6分钟=溏心蛋 / 8分钟=全熟蛋","捞出过冷水1分钟方便剥壳"],"tags":["高蛋白"]},{"id":"b_protein_02","name":"水煮蛋（2个）","category":"蛋白","mealType":"早餐","type":"减脂","calories":140,"cookingTime":"12分钟","difficulty":"超简单","ingredients":[{"name":"鸡蛋","amount":"2个"}],"steps":["鸡蛋冷水下锅，水没过鸡蛋约2cm","大火烧至沸腾，转中火","盖盖煮6分钟=溏心 / 8分钟=全熟","捞出过冷水剥壳"],"tags":["高蛋白","饱腹"]},{"id":"b_protei difficulty":"超简单","ingredients":[{"name":"菠菜","amount":"200g"},{"name":"生抽","amount":"半汤匙"},{"name":"醋","amount":"半汤匙"},{"name":"蒜","amount":"1瓣"}],"steps":["菠菜去根洗净，水开后焯水30秒（去除草酸）","捞出过冷水挤干切段","生抽+醋+蒜末拌匀"],"tags":["高纤维"]},{"id":"b_veggie_05","name":"混合坚果","category":"蔬果","mealType":"早餐","type":"减脂","calories":70,"cookingTime":"0分钟","difficulty":"超简单","ingredients":[{"name":"混合坚果","amount":"10g（约5-6颗）"}],"steps":["坚果用手掰碎即可，不要用盐焗或糖炒的"],"tags":["免开火","好脂肪"]}],"减脂_早餐_组合":[{"id":"b_combo_01","name":"全麦鸡胸三明治","category":"组合","mealType":"早餐","type":"减脂","calories":380,"cookingTime":"15分钟","difficulty":"简单","ingredients":[{"name":"全麦吐司","amount":"2片"},{"name":"鸡胸肉","amount":"80g"},{"name":"生菜","amount":"2片"},{"name":"番茄","amount":"2片"},{"name":"黑胡椒","amount":"适量"},{"name":"盐","amount":"适量"}],"steps":["鸡胸横着片成1cm薄片，两面撒盐和黑胡椒抹匀","平底锅大火烧热转中小火，刷极少量油","鸡胸每面煎3分钟，按压有弹性即熟，静置2分钟","生菜洗净甩干，番茄切0.8cm片","吐司烤2分钟","组装：吐司→生菜→鸡胸肉→番茄→生菜→吐司，对半切开"],"tags":["便携","高蛋白","可外带"]},{"id":"b_combo_02","name":"荞麦面卧鸡蛋","category":"组合","mealType":"早餐","type":"减脂","calories":330,"cookingTime":"10分钟","difficulty":"超简单","ingredients":[{"name":"干荞麦面","amount":"60g"},{"name":"鸡蛋","amount":"1个"},{"name":"小青菜","amount":"2-3棵"},{"name":"生抽","amount":"1汤匙"},{"name":"醋","amount":"半汤匙"},{"name":"芝麻油","amount":"几滴"},{"name":"小葱","amount":"1根"}],"steps":["锅中800ml水大火烧开","放入荞麦面搅散，煮2分钟","打个鸡蛋在面上（不要搅动！），再煮1分钟","放入小青菜，继续煮2分钟","碗中放生抽+醋+芝麻油，先舀一勺面汤化开","捞入面和蛋，撒葱花。暖胃管饱"],"tags":["中式","暖胃","低GI"]}],"减脂_午餐_主菜":[{"id":"l_main_01","name":"香煎鸡胸肉","category":"主菜","mealType":"午餐","type":"减脂","calories":180,"cookingTime":"15分钟","difficulty":"简单","ingredients":[{"name":"鸡胸肉","amount":"150g"},{"name":"盐","amount":"适量"},{"name":"黑胡椒","amount":"适量"},{"name":"食用油","amount":"半茶匙"}],"steps":["鸡胸肉横着片成约1.5cm厚片，两面撒盐+黑胡椒抹匀腌10分钟","平底锅大火烧热20秒，转中小火，刷极少量油","放入鸡胸肉，中小火每面煎3-4分钟","用锅铲按压最厚处有弹性即熟，取出静置2分钟再切条","吃的时候蘸生抽+醋混合汁更嫩"],"tags":["高蛋白","低脂"]},{"id":"l_main_02","name":"番茄炒蛋","category":"主菜","mealType":"午餐","type":"减脂","calories":200,"cookingTime":"12分钟","difficulty":"超简单","ingredients":[{"name":"鸡蛋","amount":"2个"},{"name":"番茄","amount":"2个"},{"name":"盐","amount":"适量"},{"name":"食用油","amount":"1茶匙"},{"name":"小葱","amount":"1根"}],"steps":["番茄划十字用开水烫30秒去皮，切小块","鸡蛋打散加少许盐","锅大火烧热转中小火，半茶匙油，倒入蛋液","底部凝固表面微湿时盛出（约1分钟，不要炒老）","同锅半茶匙油，中火炒番茄出汁，用锅铲压一压","加少量水煮开，倒回鸡蛋翻拌均匀","汤汁收浓出锅，撒葱花"],"tags":["国民菜","快手"]},{"id":"l_main_03","name":"虾仁滑蛋","category":"主菜","mealType":"午餐","type":"减脂","calories":180,"cookingTime":"12分钟","difficulty":"简单","ingredients":[{"name":"虾仁","amount":"120g"},{"name":"鸡蛋","amount":"2个"},{"name":"料酒","amount":"半汤匙"},{"name":"盐","amount":"适量"},{"name":"食用油","amount":"半茶匙"}],"steps":["虾仁解冻洗净沥干，加料酒+盐抓匀腌5分钟","鸡蛋打散加少许盐","锅大火烧热转中小火，半茶匙油","虾仁每面煎1分钟至变红","均匀倒入蛋液不要翻动，底部凝固后用铲从边缘向中间轻推","推2-3次蛋液还微湿就关火——余温继续凝固"],"tags":["高蛋白","低脂","海鲜"]},{"id":"l_main_04","name":"青椒牛柳","category":"主菜","mealType":"午餐","type":"减脂","calories":220,"cookingTime":"15分钟","difficulty":"中等","ingredients":[{"name":"牛里脊","amount":"120g"},{"name":"青椒","amount":"2个"},{"name":"蒜","amount":"2瓣"},{"name":"生抽","amount":"1汤匙"},{"name":"蚝油","amount":"半汤匙"},{"name":"料酒","amount":"半汤匙"},{"name":"食用油","amount":"1茶匙"}],"steps":["牛肉逆纹切细条（横向切断纤维），加料酒+生抽腌10分钟","青椒去籽切丝，蒜切末","锅大火烧到冒烟，半茶匙油，大火放入牛肉快速滑炒","牛肉变色（约40秒）立刻盛出","同锅半茶匙油，大火，蒜末+青椒爆炒1分钟","倒回牛肉+蚝油半汤匙，大火炒30秒出锅","牛肉从入锅到出锅不超过2分钟"],"tags":["高蛋白","补铁","有锅气"]},{"id":"l_main_05","name":"口蘑炒鸡丁","category":"主菜","mealType":"午餐","type":"减脂","calories":200,"cookingTime":"15分钟","difficulty":"简单","ingredients":[{"name":"鸡胸肉","amount":"120g"},{"name":"口蘑","amount":"100g"},{"name":"蒜","amount":"2瓣"},{"name":"生抽","amount":"半汤匙"},{"name":"蚝油","amount":"半汤匙"},{"name":"盐","amount":"适量"},{"name":"食用油","amount":"1茶匙"}],"steps":["鸡胸肉切2cm小丁，加盐+生抽腌10分钟","口蘑用湿布擦净（不要水泡！），切0.5cm片","蒜切末","锅大火烧热转中火，半茶匙油，鸡丁每面煎1分钟盛出","同锅半茶匙油，蒜末爆香","放口蘑中火炒，会先出水再收干——收到边缘焦黄最香","倒回鸡丁+蚝油，大火翻炒30秒出锅"],"tags":["高蛋白","菌菇","鲜香"]},{"id":"l_main_06","name":"葱烧豆腐","category":"主菜","mealType":"午餐","type":"减脂","calories":180,"cookingTime":"12分钟","difficulty":"简单","ingredients":[{"name":"老豆腐","amount":"200g"},{"name":"大葱","amount":"1根"},{"name":"生抽","amount":"1汤匙"},{"name":"蚝油","amount":"半汤匙"},{"name":"食用油","amount":"半茶匙"}],"steps":["老豆腐切2cm厚方块（不要用嫩豆腐！），大葱斜切段","锅大火烧热转中小火，半茶匙油","豆腐块小火慢煎，一面金黄翻面（每面约3分钟）","放大葱段炒到变软出香","生抽+蚝油+2汤匙水调汁淋入，中火烧到汤汁浓稠裹豆腐"],"tags":["植物蛋白","实惠","快手"]},{"id":"l_main_07","name":"三文鱼","category":"主菜","mealType":"午餐","type":"减脂","calories":200,"cookingTime":"12分钟","difficulty":"简单","ingredients":[{"name":"三文鱼","amount":"120g"},{"name":"盐","amount":"适量"},{"name":"黑胡椒","amount":"适量"},{"name":"食用油","amount":"半茶匙"},{"name":"柠檬","amount":"半个"}],"steps":["三文鱼两面撒盐+黑胡椒，回温5分钟","锅大火烧热转中小火，刷极少量油","鱼皮朝下煎3分钟不要翻动，翻面再煎2分钟","侧面看中间微红关火","挤柠檬汁"],"tags":["omega3","高蛋白"]},{"id":"l_main_08","name":"少油辣椒炒蛋","category":"主菜","mealType":"午餐","type":"减脂","calories":170,"cookingTime":"12分钟","difficulty":"简单","ingredients":[{"name":"鸡蛋","amount":"3个"},{"name":"螺丝椒","amount":"3-4个"},{"name":"蒜","amount":"2瓣"},{"name":"盐","amount":"适量"},{"name":"食用油","amount":"1茶匙"}],"steps":["青椒去籽切小圈，蒜切末","锅大火烧热——不放油！青椒直接干煸","中大火煸到表面出现焦斑（约2分钟），盛出——这是湘菜灵魂","鸡蛋打散加盐","同锅大火转中小火，1茶匙油，倒蛋液快速划散盛出","蒜末爆香，倒回煸好的辣椒大火炒30秒","倒回鸡蛋+盐，大火翻拌30秒出锅"],"tags":["湘味","快手","高蛋白"]},{"id":"l_main_09","name":"蒜蓉剁椒蒸鸡胸","category":"主菜","mealType":"午餐","type":"减脂","calories":160,"cookingTime":"20分钟","difficulty":"简单","ingredients":[{"name":"鸡胸肉","amount":"150g"},{"name":"剁椒","amount":"1汤匙"},{"name":"蒜","amount":"3瓣"},{"name":"生抽","amount":"1汤匙"},{"name":"料酒","amount":"半汤匙"}],"steps":["鸡胸肉横着片1.5cm厚，表面划几刀","加料酒+生抽腌10分钟","蒜剁蓉，一半拌剁椒+生抽成蒸料","腌好的鸡肉铺盘，蒸料均匀铺上","蒸锅水开，中火蒸12分钟，关火焖2分钟"],"tags":["湘味","高蛋白","蒸菜"]},{"id":"l_main_10","name":"小炒黄牛肉（少油）","category":"主菜","mealType":"午餐","type":"减脂","calories":220,"cookingTime":"12分钟","difficulty":"中等","ingredients":[{"name":"牛里脊","amount":"120g"},{"name":"螺丝椒","amount":"2个"},{"name":"小米辣","amount":"2-3个"},{"name":"蒜","amount":"3瓣"},{"name":"姜","amount":"1小块"},{"name":"生抽","amount":"1汤匙"},{"name":"蚝油","amount":"半汤匙"},{"name":"料酒","amount":"半汤匙"},{"name":"食用油","amount":"1茶匙"}],"steps":["牛肉逆纹切薄片（2mm以内），加料酒+生抽腌10分钟","青椒切段，小米辣切圈，蒜切片，姜切丝","锅大火烧到冒烟——湘菜锅要热","半茶匙油，大火放入牛肉快速滑散","牛肉变色（约30秒）立刻盛出","同锅半茶匙油，姜蒜小米辣爆香15秒","放青椒大火炒1分钟，倒回牛肉+蚝油","大火炒20秒出锅。多1秒都嫌老"],"tags":["湘菜","高蛋白","下饭"]},{"id":"l_main_11","name":"豆豉蒸排骨","category":"主菜","mealType":"午餐","type":"减脂","calories":200,"cookingTime":"30分钟","difficulty":"简单","ingredients":[{"name":"排骨","amount":"150g"},{"name":"豆豉","amount":"1汤匙"},{"name":"蒜","amount":"3瓣"},{"name":"姜","amount":"1小块"},{"name":"生抽","amount":"1汤匙"},{"name":"蚝油","amount":"半汤匙"},{"name":"料酒","amount":"半汤匙"},{"name":"生粉","amount":"1茶匙"}],"steps":["排骨泡水15分钟去血水，沥干吸干","豆豉冲一下和蒜一起剁碎","排骨+豆豉蒜蓉+姜丝+生抽+蚝油+料酒+生粉充分抓匀腌15分钟","平铺盘中不叠放，蒸锅水开中火蒸20分钟，关火焖2分钟"],"tags":["粤式","蒸菜","高蛋白"]},{"id":"l_main_12","name":"番茄龙利鱼","category":"主菜","mealType":"午餐","type":"减脂","calories":160,"cookingTime":"15分钟","difficulty":"简单","ingredients":[{"name":"龙利鱼柳","amount":"150g"},{"name":"番茄","amount":"2个"},{"name":"姜","amount":"2片"},{"name":"料酒","amount":"半汤匙"},{"name":"盐","amount":"适量"},{"name":"食用油","amount":"半茶匙"}],"steps":["鱼柳吸干切3cm块，加料酒+姜丝抓一下","番茄去皮切小块","锅大火转中火，半茶匙油，番茄炒出汁","倒300ml水大火烧开煮3分钟","放鱼块中小火煮3-4分钟，变白即熟——别煮太久会散","加盐调味"],"tags":["低脂","高蛋白","酸甜"]},{"id":"l_main_13","name":"蒜蓉蒸茄子","category":"主菜","mealType":"午餐","type":"减脂","calories":100,"cookingTime":"15分钟","difficulty":"超简单","ingredients":[{"name":"长茄子","amount":"1根"},{"name":"蒜","amount":"3瓣"},{"name":"生抽","amount":"1汤匙"},{"name":"醋","amount":"半汤匙"},{"name":"小葱","amount":"1根"}],"steps":["茄子切长段再竖切条，蒜剁蓉","蒜蓉+生抽+醋调成蒸料淋茄子上","蒸锅水开大火蒸10分钟","出锅撒葱花"],"tags":["低卡","蒜香","中式"]},{"id":"l_main_14","name":"凉拌鸡丝","category":"主菜","mealType":"午餐","type":"减脂","calories":150,"cookingTime":"20分钟","difficulty":"简单","ingredients":[{"name":"鸡胸肉","amount":"120g"},{"name":"黄瓜","amount":"半根"},{"name":"蒜","amount":"2瓣"},{"name":"生抽","amount":"1汤匙"},{"name":"醋","amount":"1汤匙"},{"name":"芝麻油","amount":"几滴"}],"steps":["鸡胸肉冷水下锅+2片姜，大火烧开转中小火煮8分钟","关火让鸡肉在热水里再泡5分钟（这样不柴）","捞出放凉手撕细丝","黄瓜切丝，蒜剁末","生抽+醋+芝麻油+蒜末调汁，鸡丝+黄瓜丝拌匀"],"tags":["高蛋白","低脂","凉菜"]},{"id":"l_main_15","name":"韭菜炒蛋","category":"主菜","mealType":"午餐","type":"减脂","calories":180,"cookingTime":"10分钟","difficulty":"超简单","ingredients":[{"name":"韭菜","amount":"150g"},{"name":"鸡蛋","amount":"3个"},{"name":"盐","amount":"适量"},{"name":"食用油","amount":"1茶匙"}],"steps":["韭菜洗净沥干（一定要沥干！），切4cm段","鸡蛋打散加盐","锅大火转中小火，半茶匙油，蛋液快速划散盛出","同锅大火半茶匙油，蒜末爆香","倒韭菜大火快炒——变软就关火（约1分钟，久了出水）","倒回鸡蛋+盐翻拌出锅"],"tags":["中式","快手","家常"]}],"减脂_午餐_配菜":[{"id":"l_side_01","name":"清炒西兰花","category":"配菜","mealType":"午餐","type":"减脂","calories":80,"cookingTime":"5-10分钟","difficulty":"超简单","ingredients":[{"name":"西兰花","amount":"适量"}],"steps":["西兰花掰小朵盐水泡5分钟洗净沥干","水开焯水1分钟（不盖盖！）捞出","锅大火少许油蒜末爆香，倒西兰花大火快炒1分钟加盐"],"tags":["快手","低卡"]},{"id":"l_side_02","name":"蚝油生菜","category":"配菜","mealType":"午餐","type":"减脂","calories":50,"cookingTime":"5-10分钟","difficulty":"超简单","ingredients":[{"name":"生菜","amount":"适量"}],"steps":["生菜洗净手撕大块沥干","锅大火少许油蒜末爆香，倒生菜大火快炒，变软出水（约1分钟）倒蚝油1汤匙翻匀立刻出锅，全程不超过2分钟"],"tags":["快手","低卡"]},{"id":"l_side_03","name":"蒜蓉西兰花","category":"配菜","mealType":"午餐","type":"减脂","calories":80,"cookingTime":"5-10分钟","difficulty":"超简单","ingredients":[{"name":"西兰花","amount":"适量"}],"steps":["西兰花掰小朵盐水泡洗沥干","水开焯水1分钟捞出","锅大火少许油蒜末爆香，倒西兰花大火快炒1分钟加盐"],"tags":["快手","低卡"]},{"id":"l_side_04","name":"凉拌木耳","category":"配菜","mealType":"午餐","type":"减脂","calories":40,"cookingTime":"5-10分钟","difficulty":"超简单","ingredients":[{"name":"干木耳","amount":"适量"}],"steps":["木耳温水泡20分钟去蒂撕片","水开焯2分钟过冷水沥干","生抽半汤匙+醋半汤匙+蒜末拌匀"],"tags":["快手","低卡"]},{"id":"l_side_05","name":"凉拌黄瓜","category":"配菜","mealType":"午餐","type":"减脂","calories":30,"cookingTime":"5-10分钟","difficulty":"超简单","ingredients":[{"name":"黄瓜","amount":"适量"}],"steps":["黄瓜拍裂切段","生抽半汤匙+醋半汤匙+蒜末拌匀静置5分钟"],"tags":["快手","低卡"]},{"id":"l_side_06","name":"白灼生菜","category":"配菜","mealType":"午餐","type":"减脂","calories":30,"cookingTime":"5-10分钟","difficulty":"超简单","ingredients":[{"name":"生菜","amount":"适量"}],"steps":["水开后生菜焯30秒立刻捞出（别超过30秒！）","淋半汤匙生抽"],"tags":["快手","低卡"]},{"id":"l_side_07","name":"清炒豆芽","category":"配 -3分钟至金黄酥脆"],"tags":["中式","快手"]}],"营养_早餐_饮品":[{"id":"n_b_main_02","name":"豆浆","category":"饮品","mealType":"早餐","type":"营养","calories":120,"cookingTime":"1分钟","difficulty":"超简单","ingredients":[{"name":"豆浆","amount":"300ml"}],"steps":["微波炉中火加热2分钟。甜豆浆可加1茶匙糖"],"tags":["中式经典"]},{"id":"n_b_main_10","name":"白砂糖","category":"饮品","mealType":"早餐","type":"营养","calories":20,"cookingTime":"0分钟","difficulty":"超简单","ingredients":[{"name":"白砂糖","amount":"1茶匙"}],"steps":["加入豆浆搅拌溶解"],"tags":["调味"]}],"营养_早餐_蛋白":[{"id":"n_b_main_08","name":"豆腐脑","category":"蛋白","mealType":"早餐","type":"营养","calories":150,"cookingTime":"2分钟","difficulty":"超简单","ingredients":[{"name":"盒装豆腐脑（咸）","amount":"1盒"},{"name":"生抽","amount":"少许"},{"name":"榨菜","amount":"少许"},{"name":"小葱","amount":"1根"},{"name":"辣椒油","amount":"适量"}],"steps":["豆腐脑冷藏的话微波炉中火2分钟加热","淋少许生抽+榨菜丁+葱花+辣椒油"],"tags":["中式经典"]}],"营养_午餐_主菜":[{"id":"n_l_main_01","name":"辣椒炒肉","category":"主菜","mealType":"午餐","type":"营养","calories":400,"cookingTime":"15分钟","difficulty":"简单","ingredients":[{"name":"猪前腿肉","amount":"150g"},{"name":"螺丝椒","amount":"4-5个"},{"name":"蒜","amount":"3瓣"},{"name":"豆豉","amount":"半汤匙"},{"name":"生抽","amount":"1汤匙"},{"name":"老抽","amount":"几滴"},{"name":"食用油","amount":"1.5汤匙"},{"name":"盐","amount":"适量"}],"steps":["猪肉切薄片肥瘦分开。螺丝椒斜切圈去籽怕辣去筋。蒜拍扁切大粒","锅大火烧到冒烟——不放油！青椒干煸用锅铲压到虎皮焦斑盛出","同锅大火1.5汤匙油，先放肥肉片中小火煸出油变透明","放瘦肉片大火滑炒变白（30秒）","放蒜粒+豆豉炒香","放煸好的辣椒大火炒1分钟","加生抽+老抽大火翻炒。沿锅边淋1汤匙水——滋啦！锅气来了","这就是每个湖南游子魂牵梦萦的味道"],"tags":["湘菜之魂","下饭神器"]},{"id":"n_l_main_02","name":"小炒黄牛肉","category":"主菜","mealType":"午餐","type":"营养","calories":380,"cookingTime":"12分钟","difficulty":"中等","ingredients":[{"name":"牛里脊","amount":"150g"},{"name":"小米辣","amount":"5-6个"},{"name":"泡椒","amount":"3-4个"},{"name":"蒜","amount":"4瓣"},{"name":"姜","amount":"1小块"},{"name":"香菜","amount":"1小把"},{"name":"生抽","amount":"1.5汤匙"},{"name":"蚝油","amount":"半汤匙"},{"name":"料酒","amount":"半汤匙"},{"name":"食用油","amount":"1.5汤匙"}],"steps":["牛肉逆纹切薄片（2mm以内）+料酒+生抽腌10分钟","小米辣+泡椒切圈，蒜姜切片丝，香菜切段","锅大火烧到冒烟1.5汤匙油。大火放入牛肉快速滑散","牛肉变色（20-30秒）立刻盛出","锅里剩油放姜蒜小米辣泡椒大火爆香15秒","倒回牛肉+生抽+蚝油大火炒20秒。撒香菜翻两下关火"],"tags":["湘菜","下饭"]},{"id":"n_l_main_03","name":"剁椒鱼头","category":"主菜","mealType":"午餐","type":"营养","calories":350,"cookingTime":"25分钟","difficulty":"中等","ingredients":[{"name":"花鲢鱼头","amount":"半个"},{"name":"剁椒","amount":"3汤匙"},{"name":"蒜","amount":"4瓣"},{"name":"姜","amount":"1大块"},{"name":"葱","amount":"2根"},{"name":"料酒","amount":"2汤匙"},{"name":"蒸鱼豉油","amount":"1汤匙"},{"name":"食用油","amount":"1汤匙"}],"steps":["鱼头冲洗干净刮掉鱼鳃黑膜。抹盐+料酒+姜片腌15分钟","剁椒太咸就水冲挤干。蒜姜剁末+剁椒+蒸鱼豉油拌匀","腌好的鱼头沥掉腥水拿掉姜片。盘底铺姜片葱段鱼头摊平","剁椒蒜蓉酱铺满鱼头表面","蒸锅水开大火蒸12-15分钟鱼眼凸出筷子能剥开","蒸好倒掉腥水。鱼头撒葱花","关键：1汤匙油烧到冒烟浇上去——滋啦！剁椒香+葱香炸开"],"tags":["湘菜经典","硬菜"]},{"id":"n_l_main_04","name":"农家小炒肉","category":"主菜","mealType":"午餐","type":"营养","calories":390,"cookingTime":"18分钟","difficulty":"简单","ingredients":[{"name":"猪五花肉","amount":"150g"},{"name":"螺丝椒","amount":"3-4个"},{"name":"蒜","amount":"3瓣"},{"name":"姜","amount":"1小块"},{"name":"生抽","amount":"1汤匙"},{"name":"老抽","amount":"几滴"},{"name":"蚝油","amount":"半汤匙"},{"name":"食用油","amount":"半汤匙"}],"steps":["五花肉切薄片。螺丝椒斜切圈。蒜姜切片丝","锅大火烧热——不放油！五花肉直接放中小火慢煎","煎到肉片边缘卷起/表面焦黄（灯盏窝！约3-4分钟）倒出多余油","放蒜姜爆香，放辣椒大火炒1分钟","加生抽+老抽+蚝油大火翻炒。太干淋点锅边水"],"tags":["湘菜","下饭"]},{"id":"n_l_main_05","name":"蒜苗炒腊肉","category":"主菜","mealType":"午餐","type":"营养","calories":400,"cookingTime":"20分钟","difficulty":"简单","ingredients":[{"name":"湖南腊肉","amount":"100g"},{"name":"蒜苗","amount":"150g"},{"name":"干辣椒","amount":"2-3个"},{"name":"蒜","amount":"2瓣"},{"name":"食用油","amount":"半汤匙"}],"steps":["腊肉冷水下锅煮15分钟去咸味变软。捞出切薄片","蒜苗斜切4cm段，茎叶分开。干辣椒切段","锅大火半汤匙油，腊肉中小火煸到微卷出油","放干辣椒蒜片炒香","先放蒜苗茎部大火炒1分钟，再放叶部炒30秒。腊肉本身咸不用加盐"],"tags":["湘味","腊味"]},{"id":"n_l_main_06","name":"酸豆角炒肉末","category":"主菜","mealType":"午餐","type":"营养","calories":280,"cookingTime":"10分钟","difficulty":"超简单","ingredients":[{"name":"酸豆角","amount":"150g"},{"name":"猪瘦肉末","amount":"100g"},{"name":"干辣椒","amount":"3-4个"},{"name":"蒜","amount":"2瓣"},{"name":"生抽","amount":"半汤匙"},{"name":"食用油","amount":"半汤匙"}],"steps":["酸豆角太咸泡水 撒葱丝","生抽+油烧到冒烟浇上去——滋啦！"],"tags":["鲜美","低脂","仪式感"]},{"id":"n_d_main_02","name":"红烧肉","category":"主菜","mealType":"晚餐","type":"营养","calories":480,"cookingTime":"60分钟","difficulty":"中等","ingredients":[{"name":"猪五花肉","amount":"200g"},{"name":"冰糖","amount":"15g"},{"name":"生抽","amount":"2汤匙"},{"name":"老抽","amount":"半汤匙"},{"name":"料酒","amount":"1汤匙"},{"name":"八角","amount":"1个"},{"name":"桂皮","amount":"1小块"},{"name":"姜","amount":"3片"},{"name":"葱","amount":"1根"}],"steps":["五花肉切3cm方块冷水下锅+料酒+姜片焯水温水洗净","锅大火不放油中小火慢煎肉块每面微黄逼出猪油倒出多余","小火+冰糖炒到琥珀色冒小泡","立刻放肉翻炒裹糖色","加生抽+老抽+料酒+姜葱+八角+桂皮","倒热水没过肉大火烧开转小火盖盖炖40分钟","开盖筷子戳肥肉能轻松透=完美。大火收汁翻动至浓稠油亮挂肉"],"tags":["硬菜","解馋"]},{"id":"n_d_main_03","name":"水煮肉片","category":"主菜","mealType":"晚餐","type":"营养","calories":420,"cookingTime":"20分钟","difficulty":"中等","ingredients":[{"name":"猪里脊","amount":"150g"},{"name":"生菜","amount":"半颗"},{"name":"豆芽","amount":"100g"},{"name":"郫县豆瓣酱","amount":"1大汤匙"},{"name":"干辣椒","amount":"8-10个"},{"name":"花椒","amount":"1汤匙"},{"name":"蒜","amount":"3瓣"},{"name":"姜","amount":"1小块"},{"name":"生抽","amount":"1汤匙"},{"name":"料酒","amount":"半汤匙"},{"name":"蛋清","amount":"半个"},{"name":"淀粉","amount":"1茶匙"},{"name":"食用油","amount":"2汤匙"}],"steps":["猪里脊切2mm薄片+料酒+蛋清+淀粉+盐抓匀腌15分钟","生菜豆芽各焯30秒铺大碗底","锅大火转小火1汤匙油+豆瓣酱小火慢炒出红油（别大火会苦）","放一半姜蒜末炒香倒400ml热水+生抽大火烧开","一片片下肉片筷拨散变白（约1分钟）立刻关火","连汤带肉倒碗中撒剩余蒜末","关键：另锅1汤匙油烧冒烟+干辣椒+花椒小火炸10秒辣椒变深红立刻离火","泼在肉片上——滋啦！"],"tags":["川菜","麻辣","过瘾"]},{"id":"n_d_main_04","name":"粉蒸排骨","category":"主菜","mealType":"晚餐","type":"营养","calories":350,"cookingTime":"45分钟","difficulty":"简单","ingredients":[{"name":"排骨","amount":"200g"},{"name":"蒸肉粉","amount":"1袋"},{"name":"红薯","amount":"半个"},{"name":"生抽","amount":"1汤匙"},{"name":"蚝油","amount":"半汤匙"},{"name":"料酒","amount":"半汤匙"},{"name":"姜","amount":"1小块"}],"steps":["排骨剁段泡水15分钟沥干吸干。加姜丝+生抽+蚝油+料酒抓匀腌20分钟","红薯去皮切1cm厚片铺蒸碗底","腌好的排骨裹满蒸肉粉摆红薯上","蒸锅水开大火蒸35-40分钟筷子能轻松脱骨。红薯吸饱肉汁=比排骨还好吃"],"tags":["蒸菜","软糯"]},{"id":"n_d_main_05","name":"土豆炖牛肉","category":"主菜","mealType":"晚餐","type":"营养","calories":380,"cookingTime"
